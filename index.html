<script>
const PAGES = ["1\n \n الهيئة العامة للتأمين الصحي \n الإدارة المركزية للتموين الطبي والصيدليات \nمقدمــــــــة\nتتشرف الإدارة المركزية للتموين الطبي والصيدليات بالهيئة العامة للتأمين الصحي بإعداد قائمة الأدوية\nالأساسية وإجراءات وبروتوكولات تداولها بالهيئة لعام 2019 حيث صدرت الطبعة الأولى عام 1966 وتوالى \nصدور الطبعات التالية خلال السنوات الماضية . وتعتبر تلك القائمة مع الدليل مرجعاً يضم جميع البروتوكولات \nوالقرارات والقواعد والتعليمات المنظمة الصادرة من الهيئة وهو دليل الطبيب والصيدلي المعين والمتعاقد مع \nالتأمين الصحي للتعامل مع الأدوية المصرح بوصفها تنفيذا لقوانين التأمين الصحي .\n \" آملين من الله أن يكون نافعاً ومعيناً لهم لأداء خدمة طبية متميزة لصالح منتفعي التأمين الصحي \" \n إعداد مراجعة يعتمد \n د/ منيرة حسين د/ ليلي السيد على السيدة الدكتورة \nد/ ناهد عبد الرحيم رئيس مجلس الإدارة \nد/ حنان العليمي د/ سهير عبد الحميد \nد/ أحمد سعودي \nد/ مروة عباس \nد/ مروة حلمي \nد/ رحاب محمد \nك/ سناء يوسف \n \n \n \n تاريخ الإصدار \n 2019 / 1 / 1", "2\nأنظمة الانتفاع بالخدمات التأمينية \nنظام العلاج التأميني الاجتماعي ) طبقاً لقانون التأمين الاجتماعي رقم 79 لسنة 1975 وتعديلاته (\nلا يجوز تحميل المؤمن عليهم أي نصيب في نفقات التأمين إلا فيما يرد به نص خاص \nو يشمل هذا النظام -:\n* تأمين إصابات العمل )الباب الرابع (\n* تأمين المرض )الباب الخامس(: و تسري أحكامه على:\n-العاملون المدنيون بالجهاز الإداري للدولة و الهيئات العامة و المؤسسات العامة \nو الوحدات العامة و الوحدات الاقتصادية التابعة لأي من هذه الجهات و غيرها من الوحدات الاقتصادية \nبالقطاع العام )مادة 2 من القانون(\n- العاملين لدى أصحاب الأعمال ) القطاع الخاص( )مادة 73 من القانون(.\n- أصحاب المعاشات )مادة 74 من القانون(. \n- الأرامل )طبقاً لقرار رئيس مجلس الوزراء رقم 1 لسنة 1981(\n- أسر المؤمن عليهم و أصحاب المعاشات من مواطني محافظة الإسكندرية )طبقاً لقرار رئيس مجلس\nالوزراء رقم 10 لسنة1981(\n- نظام التأمين الصحي على طلاب المدارس ) القانون 99 لسنة1992 المعدل بقانون رقم 3 لسنة \n ) 2017\n- يسدد الطالب ثلث ثمن الدواء بدون حد أقصى عدا الأمراض المزمنة المحددة فيصرف لها الدواء مجاناً\n- نظام التأمين الصحي على الأطفال دون السن المدرسي ) قرار وزير الصحة والسكان رقم 380 لسنة \n1997 ، مرسوم بقانون رقم 86 لسنة 2012 المعدل بقانون رقم 3 لسنة 2017( \n- مساهمة ولي أمر الطفل في ثمن الدواء الذي يصرف خارج المستشفى على غرار ما اتبع في نظام \nالتأمين الصحي على الطلاب \n- نظام التأمين الصحي للمرأة المعيلة )قانون رقم 23 لسنة 2012(", "3\nالقوانين واللوائح ) القرارات ( المنظمة للتعامل مع أدوية الهيئة العامة للتأمين الصحي\nقانون رقم 10 لسنة 1967\nرئيس الجمهورية\nباسم الأمة \nقرر مجلس الأمة القانون الآتي نصه و قد أصدرناه:\nمادة )1(\nمع عدم الإخلال بأية عقوبة أشد ينص عليها في قانون آخر يعاقب بالحبس مدة لا تقل عن ثلاثة أشهر \nو بغرامة لا تقل عن مائة جنيه و لا تزيد عن خمسمائة جنيه أو بإحدى هاتين العقوبتين كل عامل في \nالهيئة العامة للتأمين الصحي أو أحد المتعاقدين معها من الأطباء و الصيادلة أو غيرهم سهل للمنتفع \nأو لغيره من تتولى الهيئة طبقاً لنظامها تقديم الرعاية الطبية إليه الحصول على أدوية بغير حق أو\nلا تتطلب الأحوال الطبية صرفها إليه ثم تصرف فيها إلى غيره هو ومن تصرف إليه. \n- كما يعاقب بذات العقوبة كل من حصل على أدوية الهيئة بطريقة غير مشروعة ، و كل من تعامل في هذه \nالأدوية مع علمه بذلك . و يعتبر في حكم الدواء ما يصرف للمنتفع في سبيل علاجه و رعايته طبياً من\nأطراف صناعية أو أجهزة تعويضية أو أي شيء آخر.\n- و في جميع الأحوال يحكم بمصادرة الدواء ، كما يحكم على مرتكب الجريمة بأن يؤدي إلى الهيئة العامة \nللتأمين الصحي ضعف ثمنه وقت ضبطه.\nمادة )2(\n- ينشر هذا القانون في الجريدة الرسمية و يعمل به من تاريخ نشره.\n- يبصم هذا القانون بخاتم الدولة و ينفذ كقانون من قوانينها.", "4\nأمثلة للمخالفات التي تندرج تحت طائلة القانون 10 لسنة67 ) أو قوانين أشد مثل قانون العقوبات (\nالأطباء:\n-1استغلال بيانات بعض المنتفعين )الاسم والكود( لتحرير تذاكر دون علم أصحابها. \n-2 بيع دفاتر التذاكر الطبية أو جزء منها .\n-3 تدوين تشخيص وهمي بهدف وصف أدوية لا تتطلب حالة المنتفع المرضية وصفها، لرفع القيمة المادية \nللتذكرة. \n-4 تحرير التذكرة لعلاج شخص آخر خلاف المنتفع المدرج اسمه بها سواء أكان من المنتفعين بالتأمين \nالصحي أم من غير المنتفعين ، وسواء كان ذلك مجاملة أو بمقابل مادي. \n-5 الاستيلاء على التذكرة الطبية مقابل إعطاء المنتفع إجازة بدون وجه حق.\nالصيادلة:\nشراء التذاكر من أصحابها أو من وسيط بالثمن أو مقابل إضافة القيمة أو جزء منها لصالح المنتفع في \nحساب يخصه بالصيدلية أو تسليمه بون بالقيمة أو جزء منها. \n-2 استبدال الأدوية الموصوفة بمستحضرات التجميل أو أدوية لعلاج شخص آخر. \n-3 شراء أدوية تأمين صحي مختومة بأختام الهيئة أو صيدليات متعاقدة أخرى أو تواجد هذه الأدوية \nبالصيدلية ، أياً كان مكان تواجدها ولو بحجة الاحتفاظ بها للصرف مجاناً .\nالمنتفع:\n-1 بيع التذاكر للصيدلية مباشرةً أو عن طريق وسيط بالثمن أو مقابل إضافة القيمة أو جزء منها لصالح\nالمنتفع في حساب يخصه بالصيدلية أو استلامه بون بالقيمة أو جزء منها.\n-2 استبدال الأدوية الموصوفة بمستحضرات التجميل أو أدوية لعلاج شخص آخر.\n-3 بيع الأدوية أو الأجهزة التعويضية المنصرفة لعلاجه .\nالعاملين بالهيئة:\n-1 التوسط لدى الطبيب لتحرير تذاكر طبية بأسماء يتضح أنها وهمية أو صحيحة بدون علم أصحابها .\n-2 الاشتراك الجنائي مع الطبيب بتقديم بيانات المنتفعين له لتحرير تذاكر بأسمائهم دون علمهم وتزوير \nبيانات التسجيل بالعيادة .\n-3 الاتفاق الجنائي مع الصيدليات المتعاقدة لبيع التذاكر لها .\n-4 استغلال ما قد يتركه الطبيب سهواً من تذاكر دون استخدام .", "5\n أوامر إدارية\nأمر إداري رقم 1\nيتم وصف الأدوية التي تصرف من الصيدليات التابعة للهيئة بالاسم العلمي وليس التجاري \nويتم الالتزام بصرف الدواء طبقاً لتعليمات دليل الأدوية للتأمين الصحي\nأمر إداري رقم 2\nتلاحظ قيام بعض السادة الاستشاريين بعدم الالتزام بوصف الأدوية الواردة بدليل الأدوية للتأمين الصحي \nمما أدى إلى الإسراف في وصف وصرف الأدوية من خارج الدليل مما يشكل عبئاً على موازنة الهيئة\nوتعريض المرضى لآثار جانبية خطيرة نتيجة هذا الإسراف\nلذا يتم اتخاذ اللازم فوراً نحو وقف هذا الإسراف وتنفيذ تعليمات الدليل التي لا تجيز للاستشاري وصف أدوية \nخارج الدليل والبروتوكولات المعتمدة لتنظيم وصف الأدوية بالهيئة إلا الحالات الحرجة فقط \n (Drugs Saving Life (وهذه الحالات يستلزم علاجها داخل المستشفيات لحاجتها للمتابعة المستمرة \nأمر إداري رقم 3\nتيسيراً على السادة المؤمن عليهم مرضى الفشل الكلوي الذين يقومون بإجراء غسيل كلوي متكرر يصير \nمناظرتهم مرة كل ثلاث شهور بمعرفة الأساتذة الاستشاريين حيث يتم تقييم الحالة ووصف العلاج اللازم لها \nأما تكرار هذا العلاج فيتم بمعرفة أقرب أخصائي لمحل إقامة المؤمن عليه شهرياً\nأمر إداري رقم 4\nعند وصف الأدوية يتم الالتزام بوصف الدواء الوارد بالمناقصة المركزية للأدوية بالاسم العلمي \nأمر إداري رقم 5\nعند وصف أدوية لأمراض مزمنة يقتصر الوصف على الأدوية المعالجة للمرض المزمن فقط", "6\n \n تعليمات هامة للسادة الأطباء و الصيادلة\nمستخدمي التذاكر الطبية\nالتذكرة الطبية -:\nتعامل التذكرة الطبية معاملة الشيك )تتميز برقم مسلسل مطبوع و رقم مجموعة ( ولذلك يجب تحري الدقة \nفي تحريرها حتى تكون صالحة للصرف وطبقا للقواعد التفصيلية بدليل الأدوية وتعديلاته والتي تسهل \nللمنتفع الحصول على الدواء ولذلك فإن الهيئة أعدت نماذج مختلفة طبقاً لقانون الانتفاع و كذلك سلطة \nالوصف وفي حالة عدم مراعاة الدقة في تحريرها يترتب عليه عدم صرف التذكرة وعودة المنتفع للطبيب \nمحرر التذكرة لتعديلها \nأنواع التذاكر الطبية المستخدمة :\n- توجد تذاكر داخلية مخصصة فقط للصرف من صيدليات الهيئة المملوكة لمنتفعي كل قانون ، و مدون \nعليها رقم القانون أو النظام ، كما توجد تذاكر للصرف الخارجي .", "7\nأولاً -: الإجراءات التي تتبع عند استلام و إرجاع دفاترالتذاكر الطبية :\nعند بدء الطبيب العمل بالهيئة يتقدم إلى مدير المنطقة المختصة بصورة بطاقة الرقم القومي + عدد 2\nأكلاشيه حجم صغير بالاسم و التخصص فقط ، و إذا رغب في توكيل أحد معاونيه كمندوب لاستلام الدفاتر \nفيحضر معه المندوب ببطاقة الرقم القومي .\n تقوم المنطقة بتحرير نموذج خاص ) تصريح لطبيب باستلام دفاتر تذاكر طبية ( يدرج به كل البيانات \nالخاصة بالطبيب\n) الاسم – نموذج توقيعه – بصمة الأكلاشيه – بيانات بطاقة الرقم القومي – عنوان وتليفون السكن –\nجهة العمل الأصلية – التخصص – نوع التعاقد و مكانه – تاريخ بدء العمل – نوع الدفاتر المصرح له \nباستلامها و عددها – جهة تسليم الدفاتر – توقيع الطبيب بما يفيد صحة البيانات –\nوكذلك بيانات المندوب إن وجد و نموذج توقيعه ..... إلخ ( \n و يعتمد النموذج من مدير المنطقة و يحرر هذا النموذج بأرقام مسلسلة سنوية و من أصل يحفظ طرف \nأمين المخزن و صورة ضوئية لكلٍ من ) الموظف المكلف بختم التذاكر / المراجعة الفنية الصيدلية /\nالمراجعة الفنية الطبية / الاستحقاقات بالمنطقة (\n تلتزم المنطقة بإخطار نفس الجهات السابقة فور انتهاء تكليف الطبيب بالعمل أو نقله لعمل آخر\n يتقدم الطبيب لأمين المخزن المختص لصرف التذاكر. وفي أول مرة يقوم بالتوقيع على الإقرار التالي \nالذي يحرر من أصل طرف أمين المخزن )و صورة ضوئية تسلم للطبيب و أخرى للموظف المكلف بختم \nالتذاكر و صورة طرف مدير المنطقة/العيادة(", "8\nالهيئة العامة للتأمين الصحي نموذج ) 2 (\n الإقرار الذي يحرره الطبيب عند صرف دفاتر تذاكر طبية لأول مرة \nفرع : --------- المنطقة : مسلسل : التاريخ : / / \nاسم الطبيب: ---------------- رقم وتاريخ الإخطار الوارد من المنطقة بالعمل :\n أقر بالالتزام التام بما يلي بالنسبة لدفاتر التذاكر الطبية الخاصة بالهيئة و التي تسلم لي حالياً\n و مستقبلاً كعهدة شخصية -:\n-1 أنني أعلم أنها دفاتر ذات قيمة و أنني مسئول عن المحافظة عليها من الضياع أو السرقة وغير \nمسموح للغير من الأطباء باستخدامها .\n-2 أن أقوم فوراً بالإبلاغ عن فقد أي دفتر أو جزء منه أو كعب مستعمل فور علمي بذلك و أن يتم الإبلاغ \nللشرطة وكذلك إدارة المنطقة التابع لها و أن أتحمل كل ما يترتب على الفقد جنائياً ومالياً\n-3 أنني اطلعت على القانون 10 لسنة 67 و استلمت نسخة من دليل الأدوية طبعة 2019 والتعديلات \nالتي صدرت له حتى أخر تعديل و أنه يتعين علي استخدام هذه الدفاتر فقط في الغرض التي خصصت \nمن أجله و طبقاً للقواعد التفصيلية الموضحة بدليل الأدوية و تعديلاته , و التي تسهل للمنتفع\nالحصول على الدواء و كذلك ضوابط ترشيد استهلاك الدواء ، كما أقر بأنني أعلم أن استخدام هذه\nالتذاكر لوصف أدوية لغير المنتفعين هي مخالفة تندرج تحت طائلة القانون رقم )10( لسنة 67\n-4 ألتزم باستخدام الدفاتر طبقاً لتسلسل أرقام التذاكر و أن أتحقق قبل إعادة الكعوب أنه لا توجد تذاكر لم\nتستخدم ، و أن لا أطلب دفاتر جديدة إلا مقابل الكعوب المرتجعة و بها الصور كاملة العدد وواضحة\nالبيانات وأن يكون عدد الدفاتر عهدتي ثابتاً طبقاً للمدون بالإقرار\n-5 ألتزم برد كل ما لدي من دفاتر أو كعوب بمجرد انتهاء تكليفي بالعمل الذي تسلمت الدفاتر من أجله \n-6 أقر بعدم وجود أي دفاتر أو كعوب طرفي سبق استلامها من أي جهة بالهيئة .\n-7 الدفاتر المصرح لي بها هي عدد .... دفتر قانون .... \nــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــ\nتوقيع الطبيب بالإقرار بما ورد عاليه واستلامه لنسخة من الإقرار --------------\nتوقيع مسئول التذاكر الطبية الذي سيتولى الصرف-----------------------------\nتوقيع أمين المخزن الذي سيتولى الصرف ------------------------------------ \n يعتمد ،،،،،\n مدير الوحدة \n-----------------", "9\nيوقع الطبيب باستلام الدفاتر )غير مختومة( من أمين المخزن على السجل المخصص لذلك كما \nهو موضح بالنموذج التالي -:\nالهيئة العامة للتأمين الصحي ) نموذج رقم 399 \" ت.ص \" (\nفرع .................\nالمنطقة .................\nمستشفى / عيادة ................. سجل تسليم التذاكر الطبية \n \nمن رقم ....... مسلسل\nتاريخ اسم الطبيب توقيع الطبيب إلى رقم .......\nالاستلام\nتوقيع المستلم \nفي المنطقة\nتاريخ \nالتسليم\n- علي الطبيب أو مندوبه مراجعة سلامة الدفاتر و صحة البيانات المسجلة بالسجل خاصة رقم \nالمجموعة و الرقم المسلسل المطبوع و أن نوع الدفاتر و القانون هو الخاص به قبل التوقيع باستلامها \n- على الطبيب أو مندوبه التوجه للموظف المختص بختم الدفاتر )المراجع( ، والذي يكون مقره بنفس \nالمبنى المتواجد به المخزن، ليقوم الأخير بختم الدفاتر بختم شعار الجمهورية المخصص لهذا الغرض \nعهدته ، و يراعى الوضوح التام لبيانات الختم و تستخدم دائماً ختامات سليمة و حبر مناسب\n، وعلى المراجع إعادة تسجيل بيانات الدفاتر في كارت يخصص لكل طبيب \n) أو صفحات مستقلة بسجل حرف ز ( و تكون بيانات الكارت ) اسم الطبيب و رقم الإخطار الوارد من \nالمنطقة بالتصريح له باستلام دفاتر ثم جدول يدون به نوع الدفتر و القانون و رقم المجموعة و رقم أول \nتذكرة و تاريخ الختم و توقيع الطبيب أو المندوب بما يفيد ختم الدفاتر / تاريخ ارتجاع الكعب من واقع \nصورة الاستمارة 111 ع.ح.التي ترد إليه من أمين المخزن بإضافة الكعوب المرتجعة (\nوعلى الطبيب أو مندوبه التحقق من ختم كل التذاكر و التوقيع بما يفيد ذلك على السجل المشار إليه \n- عند انتهاء استخدام الدفاتر ترتجع لنفس أمين المخزن ، و عليه التحقق أنها منصرفة من نفس المخزن \nو أنها لا تحتوي على صور تذاكر مفقودة أو أصول لم تستخدم غير ملغاة و على الطبيب التحقق من\nتسديد بيانات الارتجاع المشار إليها عاليه بنفس سجل الاستلام ، و يوقع بما يفيد الارتجاع للكعب .\n*لا يقوم أمين المخزن بصرف أكثر من دفتر من كل فئة في الدفعة الواحدة )فيما عدا المناطق النائية ( \nويقوم الطبيب بالتوقيع في السجل المخصص لذلك", "10\nثانياً -: الإجراءات التي تتبع في حال فقد دفتر التذاكر الطبية أو جزء منه -:\nدفتر التذاكر الطبية هو أحد الدفاتر المالية ذات القيمة و بعد ختمه يصبح مثل دفاتر الشيكات لذلك يجب \nالمحافظة عليه بحرص ومراعاة إعداد أماكن مناسبة للحفظ بالعيادات و عدم السماح للغير بتداوله أما \nإذا فقد الدفتر أو جزء منه فعلى الطبيب ) أو أمين المخزن ( اتباع الإجراءات الآتية -:\n.1 تقديم بلاغ عن الدفاتر التي فقدت وبياناتها )نوعها / القانون/ رقم المجموعة/ الرقم المسلسل /\nهل هي مختومة أم لا( و ظروف الفقد لقسم الشرطة المختص .\n.2 يقوم بإبلاغ رئاسته المباشرة و إدارة المنطقة التابع لها بالأمر مع إرفاق صورة من بلاغ الشرطة \nوتقوم المنطقة بدورها بعمل تحقيق داخلي و إبلاغ مدير الفرع و ذلك لاتخاذ كافة الاحتياطات اللازمة \nلمنع استخدام الدفتر أو التذاكر المفقودة .\n.3 يتم إبلاغ قسم الصيدليات بالفرع في نفس اليوم برقم الدفتر أو الدفاتر أو التذاكر المفقودة ورقم \nالمجموعة و نوع الدفتر و القانون وهل هي مختومة بشعار الجمهورية من عدمه ، و هل عليها اسم \nالطبيب أو الأكلاشيه الخاص به من عدمه ، وعلى رئيس قسم الصيدليات في نفس اليوم عمل نشرة بهذه\nالبيانات ترسل لجميع الصيدليات المملوكة و المتعاقدة في الحدود الجغرافية لصرف هذه النوعية من \nالتذاكر\nو ترسل مع مندوب أو أكثر بسركي خاص أو بخطابات مسجلة بعلم الوصول ، وذلك بالإضافة إلى نشر \nإعلان في ثلاثة أعداد متتالية في جريدة رسمية. أو جريدتين يوميتين متى رأى مدير الفرع ما يبرر \nذلك.\nوذلك لمصادرة ما قد يقدم منها للصيدليات للصرف و إبلاغ النيابة العامة لمباشرة التحقيق . \nو اتخاذ باقي الإجراءات القانونية . كما تبلغ نشرة لكل مكاتب المراجعة الفنية بالفرع لكي يقوم \nالصيادلة بالبحث عن أي تذكرة تكون قد صرفت من إحدى الصيدليات فعلاً . و تحصل كل مصاريف\nالنشر من صاحب العهدة المسئول عن الفقد.\n.4 يجب على مدير المنطقة تشكيل لجنة فوراً ) لا يكون صاحب الدفتر المفقود عضواً فيها ( للبحث \nعن سبب الفقد و مدى الضرر الناتج عنه و السبب في تأخير التبليغ إن وجد ، وهل الفقد ناتج عن عمد \nأو إهمال أو قصور في تعليمات الهيئة أو وسائل المحافظة على الدفاتر ؟ وهل توجد دفاتر أخرى مفقودة \nلم يبلغ عنها ؟ و تقدم اللجنة تقريرها لمدير المنطقة الذي يحيله لمدير الفرع و عليه اتخاذ الإجراءات \nالمناسبة التي يراها حيال المسئولين و إذا ظهر لمدير الفرع ما يدعو لإبلاغ النيابة العامة فعليه الإسراع \nفي ذلك حتى لا يكون من وراء التأخير ضياع لبعض معالم الجريمة.\n.5 إذا اتضح من التحقيقات أن الفقد هو نتيجة سرقة أو اختلاس أو للتغطية على تلاعب ، ففي هذه \nالحالة تشكل لجنة لمراجعة أعمال الموظف المسئول أو صاحب العهدة و حصر ما قد يكتشف من دفاتر \nمفقودة لم يبلغ عنها ، و معرفة الطرق التي اتخذت في ارتكاب الحادث ، و معرفة الأسباب التي سهلت \nارتكابه، و تقترح أنجح الطرق أو الوسائل لتلافي تكرار الحادث ، و يتم إيقاف المسئول عن العمل \nوتخطر النيابة العامة.", "11\nثالثاً-:إجراءات التعامل مع المنتفع في تحرير وصرف التذكرة الطبية\n- التعامل مع المنتفع\n.1 التحقق من شخصية طالب الخدمة و صلاحية البطاقة العلاجية .\n*على الطبيب التأكد من شخصية المنتفع قبل إجراء الكشف الطبي عليه وذلك بالاطلاع على البطاقة \nالعلاجية الخاصة به المثبت عليها صورته والتي يجب أن تكون مختومة من الفرع كما يتم التأكد من تجديد \nالبطاقة وأن جميع البيانات مدونة بها وعدم وجود صفحات منزوعة منها \n- كما أن كارنيهات الطلبة المثبت عليها الصورة يتم تجديدها سنوياً بختم ضاغط على ركن الكارنيه\nالمخصص للعام الدراسي حتى لا تستخدم بعد ترك الطالب للدراسة كما أن بطاقات المواليد تجدد سنوياً\nبلصق طابع تأمين صحي في المكان المخصص مع التأشير بالتجديد عليها من الجهة المختصة \n*وعلى الصيدلي الصارف الاطلاع على البطاقة العلاجية للتحقق من شخصية المنتفع وصحة البيانات\n.2 الاطلاع على البيانات العلاجية السابقة بالبطاقة\n* على الطبيب قبل توقيع الكشف الطبي على المنتفع الاطلاع على البيانات العلاجية السابقة المدونة\nبالبطاقة قبل وصف أي علاج لتجنب حصول المنتفع علي دواء لا يزال لديه حيث يحصل محترفي التردد \nعلى أدوية متشابهة أكثر من مرة من أكثر من طبيب أو تكرار العلاج قبل الموعد المحدد له وأي مخالفة \nفي ذلك فإن الطبيب يتحمل قيمة أي أدوية توصف و تصرف للمنتفع بدون وجه حق \n.3توقيع الكشف الطبي على المنتفع \nعلى الطبيب أن يراعى الدقة وطلب ما يلزم من أبحاث معملية أو إشعاعية )حسب سلطة الطبيب( حتى يتم \nوصف الأدوية اللازمة للحالة دون زيادة أو إسراف مع عدم وصف أدوية متشابهة في المفعول ويتم إثبات \nكافة البيانات ) التشخيص و الفحوص المعملية والإشعاعية و تاريخ الكشف والعلاج الموصوف كاملاً\nوجرعاته ومدة استعماله وتوقيع وأكلاشيه الطبيب ( في الصفحات المخصصة لذلك في البطاقة .\n.4 ضوابط تحرير التذكرة الطبية\n1 - يستعمل القلم الجاف ولا يجوز استخدام القلم الرصاص\n2 - يستخدم كربون ذو وجهين عند تحريرها وأن يكون المستعمل جيد وفي حالة عدم توافره يستعمل \nالنوع العادي بعد أن يتم ثنيه ويجب التحقق من وضوح كل البيانات على صورة التذكرة التي تبقى بكعب \nالدفتر \n-3 يتم ختمها بخاتم شعار الجمهورية \n-4 إملاء بيانات الجزء العلوي من التذكرة باللغة العربية بخط واضح \nأ- اسم العيادة \nب- اسم الطبيب\nج- تاريخ الكشف \nد- رقم بطاقة التأمين الصحي", "12\nوعدم الدقة في كتابة البيانات يعرض التذكرة للطعن في صحتها وبالتالي تعتبر التذكرة مزورة مالم يتمكن \nمحررها من إثبات خلاف ذلك\nذ- وكتابة التشخيص بخط واضح باللغة الإنجليزية و بدون رموز أو اختصارات .\n - بالنسبة للعلاج الشهري استخدام التعبيرات الواردة بالقرار ) مع إمكانية إضافة أي إيضاحات أخرى \nللتشخيص بين قوسين ( والهدف من ذلك هو أن يتمكن الصيدلي والمفتشين من مراجعة التشخيص\nالمزمن على القرارات المحددة للأمراض المزمنة لاكتشاف أي مخالفة للقرار أو تزوير يكون قد أضيف \nللحصول على أدوية بدون وجه حق .\n-5 ختم الروشتة بأكلاشيه صغير باسم وتخصص الطبيب دون أي بيانات أخرى وعدم وجود الأكلاشيه \nأو اسم الطبيب بخط واضح يمنع صرف التذكرة \n-6 يسلم الأصل للمنتفع وتظل الصورة بكعب الدفتر \n-7عند الإلغاء يظل الأصل والصورة بكعب الدفتر مؤشراً عليها بالإلغاء\n-8 تحفظ أصول الدفاتر الطبية بالعيادات عامان خلاف عام العمل الحالي مالم تكن مطلوبة في تحقيق \nأو فحص أعمال \n* وعلى الصيدلي التحقق من صلاحية التذكرة واستيفاءها لضوابط الصرف:\n - تقديم التذكرة خلال مدة صلاحيتها )تاريخ الكشف لم يمر عليه أكثر من أربعة أيام(\n - وجود خاتم شعار الجمهورية المختص بالهيئة\n - وجود الرقم المسلسل المطبوع على التذكرة ورقم المجموعة )يمكن للطبيب إذا تمزق هذا الجزء من \nالتذكرة عند نزعه من الدفتر كتابته باليد والتوقيع بجانبه )في حالة عدم وجوده يمكن للطبيب كتابته \nوالتوقيع بجواره(\n- وجود التشخيص )طبقاً للتعليمات المنظمة(\n- أكلاشيه باسم الطبيب و تخصصه )في المكان المخصص(\n- توقيع الطبيب بنهاية التذكرة وبجوار أي تأشيرات أو تعديلات )و ليس الأكلاشيه(\n- استيفاء بيانات الجزء العلوي من التذكرة ومطابقتها لبيانات البطاقة العلاجية\n- نوع التذكرة مطابق للقانون الخاضع له المنتفع ) لنوع البطاقة العلاجية ( لتحصيل المبلغ المطلوب.\n- التذكرة صالحة للصرف لمدة ثلاثة أيام خلاف يوم تحريرها )بما في ذلك تذاكر العلاج الشهري \n و تكراره( \n- التذكرة صالحة للصرف الخارجي طبقاً للتعليمات و القواعد التي يضعها الفرع )بالنسبة للصيدليات \nالمتعاقدة(", "13\nملحوظات هامة يجب مراعاتها -:\n* تاريخ الكشف-:\nوأهميته أن التذكرة صالحة لمدة 3 أيام خلاف يوم تحريرها ولكن في الأحوال التي لا يتمكن المنتفع من \nصرف التذكرة خلال المدة الموضحة بسبب نقص الدواء في السوق يجوز للمنتفع إذا انقضت مدة صلاحية \nالتذكرة الطبية للصرف التقدم للطبيب محرر التذكرة أو لمدير العيادة خلال أسبوع من تحرير التذكرة \nالعادية أو خمسة عشر يوماً من تحرير تذكرة علاج شهري أو تكراره إذا ما تحقق أن الحاجة للدواء\nمازالت قائمة طبقاً لقواعد التصويب الصحيحة التالية : -\n- شطب التاريخ المنتهي كلياً\n- كتابة التاريخ الجديد كاملاً أعلاه\n- توقيع الطبيب محرر التذكرة بجوار التاريخ الجديد )أو توقيع مديرالعيادة وختم العيادة( ولا يستخدم \nالأكلاشيه كبديل للتوقيع \n- التأشير بالتاريخ الجديد بالبطاقة لمراعاة ذلك عند وصف العلاج في المرة التالية\nتصبح التذكرة بعدها سارية المفعول لأربعة أيام أخري ) تلغى بعدها (\nملحوظة -:\n* لا يجوز استخدام ختم للتاريخ حيث أنه لن يظهر على خلفية أو صورة التذكرة وأي تعديل للتاريخ بخلاف \nهذا يمنع صرف التذكرة .\n* لا يجوز على الإطلاق استخراج تذكرة بدل فاقد لأي سبب كان ولكن يجوز استخراج تذكرة بدل تالف\nو إذا قدمت التذكرة التالفة خلال مدة صلاحيتها يتم تمزيق الجزء السفلي من التذكرة الملغاه وترفق باقي \nالتذكرة بصورة التذكرة الجديدة بالدفتر و يؤشر عليها بدل تالف\nوصف الأدوية اللازمة لحالة المريض مع الالتزام بالتعليمات كما يلي -:\n* يجب على الأطباء الالتزام بوصف الأدوية بالاسم العلمي ) الكيميائي ( طالما كان الدواء يحتوي على \nمادة فعالة أساسية واحدة أو مادتين فعالتين على الأكثر وطالما يوجد أكثر من دواء تجاري بنفس \nالتركيب الكيميائي والتركيز وفي غير ذلك يمكن وصف الدواء بالاسم التجاري \nويراعى في وصف الأدوية أختيار الدواء الأقل سعراً مادام يؤدي الغرض المطلوب بنفس الكفاءة\nوتراعى البروتوكولات والأوامر الإدارية الصادرة عن الهيئة لعلاج بعض الأمراض أو استخدام بعض \nالأدوية ولا يتم وصف أدوية خارج التشخيص المدون أو خارج تخصص الطبيب المعالج أو أدوية \nمتشابهة المفعول\n* يتم كتابة الأدوية باللغة الإنجليزية مع توضيح مايلي -:\n- الشكل الدوائي والجرعة اليومية وموعدها والمدة المحددة للعلاج\n- التركيز ) وفي حال عدم توضيح التركيز يتم صرف أقل تركيز (\n- الالتزام بالكتابة بين الأسطر في الخانات المخصصة للطبيب وعدم الكتابة في الخانات المخصصة \nللسعر بمعرفة الصيدلي لتسهيل مراجعة التذكرة .\n* وضع خط نهاية التذكرة و تفقيط عدد الأدوية بالحروف )مثلاً items Three)\n* التوقيع في الخانة المخصصة لتوقيع الطبيب و ليس الأكلاشيه وكذلك التوقيع بجوار أي تعديل أو \nتصويب و بجوار التأشيرات ) مثل زيارة منزلية – ملازم الفراش – تكرار علاج ....( \n* أكلاشيه )باسم الطبيب و تخصصه فقط( و يوضع في المكان المخصص ومرة واحدة فقط", "14\nتسليم التذكرة للمنتفع\nيسلم المنتفع التذكرة من الأصل فقط ويراعى عند نزعها من الدفتر عدم تمزيق الجزء الذي يحتوي على \nالرقم المسلسل ورقم المجموعة وهو الأمر الذي يمنع صرف التذكرة \nفإذا حدث ذلك عفواً يتم كتابته باليد على أصل التذكرة مع التوقيع بجواره .\nوعلى الصيدلي التحقق من مطابقة الأدوية الموصوفة للتعليمات و أهمها :\n مطابقة لسلطة الوصف مع مراعاة دليل الطلبة والمواليد\n مطابقة العدد وكمية كل صنف لتعليمات وصف الدواء \n علاج )أو تكرارعلاج( لمدة < أسبوع يراجع التشخيص )ليكون من بين الأمراض المزمنة المحددة(\n وصف أكثر من 3 أصناف يراجع التشخيص )ليكون لأكثر من تشخيص من التشخيصات المزمنة \nالمحددة(\n كتابة الجرعة اليومية و مدة استعمال كل صنف على حدة مدونة لإمكان حساب الكمية المطلوبة.\nالحالات التي لا يجوز فيها تحرير التذكرة الطبية \n- عدم وجود البطاقة العلاجية المثبت عليها الصورة والمختومة بخاتم الهيئة مع المنتفع أو عدم \nصلاحيتها \n- عدم وجود خاتم شعار الجمهورية على أصل التذكرة \n- عدم وجود رقم المجموعة مع / أو رقم التذكرة المسلسل \n- تحرير التذكرة على نموذج يخص قانون يخالف القانون الخاضع له المنتفع \n- تحرير تذكرة على دفتر يخص طبيب آخر \n- تحرير تذكرة طالب بتشخيص مرض غير مزمن على نموذج التذاكر المجانية الخاصة بالأمراض \nالمزمنة للطلاب", "15\n وصف الدواء\nيقتصر وصف الأدويه المدرجة بدليل أدوية الهيئة نوعاً وعدداً وكماً تبعاً للقواعد المنظمة لصرف الأدويه \nكالآتي -:\n-1أصناف توصف بمعرفة الطبيب الممارس والأخصائي والاستشاري ، ويرمز بجانبها بالرمز .Gp\n-2أصناف توصف بمعرفة الطبيب الأخصائي والاستشاري ويرمز بجانبها بالرمز .Sp\n-3أصناف توصف بمعرفه الطبيب الاستشاري فقط ويرمز بجانبها بالرمز .Con\nطريقة الوصف سلطة الوصف الفئة الرمز \n نوعاً\nالممارس\n)يلتزم بوصف الأدوية\nالمحددة للممارس(\nالكبار\nالطلبة\nمواليد\n \n Gp.\n \n كماً\nبحد أقصى في الزيارة الواحدة بما يكفي علاج أربعة أيام طبقاً\nللجرعة اليومية التي يحددها الطبيب \nفي حالة الربو الشعبي وضغط الدم يحق له كتابة ما يكفي علاج أسبوع \nوبالنسبة للمواليد فإن الحد الأقصى هو ما يكفي علاج خمسة أيام\n عدداً بحد أقصى حتى ثلاثة أصناف في الزيارة الواحدة\n نوعاً\nالأخصائي\nيلتزم بوصف الأدوية المحددة للأخصائي\nبالإضافة للأدوية المحددة للممارس\nالكبار\nالطلبة\nمواليد\n \n Sp.\n \n كماً\nبحد أقصى في الزيارة الواحدة بما يكفي علاج أسبوع طبقاً للجرعة اليومية التي \nيحددها الطبيب حتى ولو أدى ذلك لوصف أكثر من عبوة وبالنسبة للمواليد فإن\nالحد الأقصى هو ما يكفي علاج خمسة أيام أما في حالة الأمراض المزمنة المحددة \nفيما بعد والتي استقرت علاجياً فإنه يمكن للأخصائي وصف علاج في الزيارة الواحدة\nلمدة حدها الأقصى شهرين طبقاً لمدى استقرار الحالة\n \n عدداً\nبحد أقصى حتى ثلاثة أصناف في الزيارة الواحدة للكبار والمواليد والطلبة\nأما إذا كان التشخيص لأكثر من مرض مزمن فيمكن لأخصائي واحد أو\nأكثر وصف لغاية ستة أصناف في الزيارة الواحدة) مع مراعاة أن للكبار جدول\nللأمراض المزمنة وللطلبة جدول آخر (\n نوعاً\nالاستشاري \nوله الحق في وصف جميع الأدوية المدرجة بالدليل ولا يجوز له بالخروج عنها إلا \nفي الحالات الحرجة التي ترفق بها التحاليل الطبية وبموافقة اللجنة العليا للدواء\n)على ألا يكون من مجموعة الفيتامينات أو الأدوية التي تحتوي على حبوب اللقاح أو\nغذاء ملكات النحل.....(\nوأن يكون مسجلاً بوزارة الصحة ومدون بالعبوة ذلك وأن يكون مسعراً جبرياً\nالكبار\nالطلبة\nمواليد\n \nCon. \n \n \nكماً - عدداً كماً م شطب الصيدلية يومياً بمراجعة جميع صور التذاكر المستخرجة بمعرفة الصيدلية والتحقق من \nصحتها بمراجعة التذكرة الأصلية و التأشير على صور كعب الدفتر بما يفيد المطابقة \nويعتبر الإخلال بهذه المراجعة من قبيل الإهمال الذي يستوجب المساءلة وإذا ثبت وجود أخطاء فيعتبر \nالمسئول عن الشطب مشاركاً في المخالفة\n) لا يتم إعادة كعب هذه التذاكر للمخزن قبل مراجعتها و التأشير بما يفيد ذلك بمعرفة الشطب (.\n يمكن للمنتفع صرف التذكرة المستخرجة من أي صيدلية مملوكة داخل نطاق الفرع أو من أي \nصيدلية متعاقدة داخل النطاق الجغرافي الذي يحدده الفرع.\n إذا لم يتوفر الدواء بـ3 صيدليات متعاقدة )ويثبت ذلك بأختامها خلف التذكرة( فإنه يجوز : -\n للمنتفع شراءه من أي صيدلية خارجية. \n ويتقدم لصيدلية العيادة التابع لها )خلال مدة استخدام الدواء( و معه أصل التذكرة الخارجية + أصل \nالفاتورة + جميع علب الدواء .\n تقوم الصيدلية بمراجعة الدواء علي التذكرة والفاتورة و التأكد من صلاحية الدواء وختم جميع العلب \nبخاتم الصيدلية وتدون إقرار على الفاتورة بالآتي : )روجع و الأدوية مطابقة للتذكرة ومسعرة جبرياً\nوصالحة للاستخدام ( مع توقيع مديرالصيدلية والأكلاشية الخاص به .", "22\nتسعير التذكرة لتحديد المبلغ الذي يتحمله المنتفع ، و التأكد من تحصيل القيمة\n- ) لا يتم تحصيل اى رسوم مقابل صرف الدواء لجميع منتفعي التأمين الصحي ماعدا الحالات الغير مزمنة \nلطلاب المدارس والرضع فيتم سداد ثلث قيمة العلاج الجبرية دون حد أقصى( \n- استيفاء بيانات الجزء السفلي من التذكرة من واقع بيانات بطاقة التأمين الصحي \n- ختم الدواء وتسليمه للمنتفع )أدوية تأمين صحي محظور بيعها( و ختم التذكرة )تم الصرف( ويراعى \nوضوح الأختام \nعلماً بأن عدم ختم الأدوية أو عدم وضوحه يعرض الصيدلي للمساءلة.\n* العمل على تقديم أعلى خدمة صيدلية ممكنة من خلال -:\nتوعية المرضى )Education Patient )بالمعلومات الآتية-:\n شرح طريقة الاستعمال و الجرعات وحسن تغليف الدواء \n معلومات عن المرض.\n معلومات عن الدواء و تشمل-:\n.1 تفاعلات الأدوية مع بعضها البعض )Interactions Drug – Drug)\n.2 تفاعلات الأدوية مع الغذاء )Interactions Food – Drug)\n.3 الآثار الجانبية المحتمل حدوثها )ٍ Effects Side)\n.4 الجرعات المستخدمة من الدواء و طريقة استخدامه \n.5 التغيرات الطبيعية التي تصاحب استخدام بعض الأدوية مثل ) تغير لون البول-غثيان ..إلخ (\n الرد على استفسارات المرضى\nتعليمات هامة -:\n تقرب الكميات المنصرفة لأقرب وحدة )أي حذف ما يقل عن نصف العبوة أو الشريط و استكمال \nنصف العبوة أو أكثر لعبوة كاملة( ويؤشر بذلك في البطاقة \n الأقراص المتوفرة في شكل عبوات كبيرة )لعلاج الأمراض المزمنة مثل النوكسين 100 قرص( \nوتزيد عن احتياج المنتفع تصرف عبوات كاملة و يؤشر بذلك في البطاقة )مع ختم الصيدلية( ليتم مراعاة \nذلك طوال مدة توافر العلاج\n يقوم الصيدلي بعمل قائمة أسبوعية بالأصناف المتوفرة بالصيدلية بالاسم العلمي المكتوب علي \nالعبوة و كذلك بيان بالأدوية الموجودة بكميات غير كافية لعدم كتابة علاج شهري منها بينما يكتب علاج \nأسبوع لحين توفير العلاج و يتم تعميمها علي الأطباء", "23\n في جميع حالات التكرار لا بد من ملاحظة الآتي -:\n- أن يوضح القائم بالتكرار :التشخيص كاملاً باللغة الإنجليزية و بدون اختصار أو رموز\nثم عبارة : تكرار)رقم التكرار (علاج د/ )اسم الطبيب الموصي بالتكرار( أخصائي/ استشاري )تخصصه( \nبالتوصية صـــ )رقم الصفحة( بالبطاقة العلاجية )و رقم التذكرة المحررة أول مرة( بتاريخ......... \nويوقع القائم بالتكرار بجوارها و ترفق بها صورة تذكرة الأخصائي أو الاستشاري \n-التأكد من عدم مرور المدة المحددة لإعادة العرض طبقاً لمدة أو عدد مرات التكرار الموصى بها .\n- التأكد من عدم تأخر المريض عن موعد التكرار و يمكن التجاوز عن تأخير 10 أيام بحد أقصى على تاريخ \nالتوصية للأمراض المزمنة في ظروف حضور المنتفع بعد إجازة رسمية طويلة لتعطل العمل خلالها \nبعيادات الهيئة أو ظروف خاصة لدي المنتفع منعته من الحضور\n) التأشير بالتاريخ الجديد بالبطاقة لمراعاته المرة التالية ( أما إذا تجاوز التأخير 10 أيام فلا بد من إعادة \nالعرض لإعادة تقييم الحالة و تقرير ما يلزم .\n- التأكد من نفاذ العلاج المنصرف في الدفعة السابقة فقد تصرف عبوة 100 قرص بينما اللازم 30 قرصاً\nفلا يكرر و التعليمات للصيدلي بإيضاح العبوة المنصرفة في البطاقة مع ختم الصيدلية لتنبيه الطبيب عند \nالتكرارالتالي .\n- يراعى الدقة في تنفيذ تأشيرة التكرار فقد يكون المطلوب تكرار أصناف معينة دون أخرى .\nلا يجوز تكرار علاج لمدة أو بجرعة تخالف تعليمات صرف العلاج السابق ذكرها . ويعرض الأمرعلى \nمدير العيادة لمراجعة الطبيب الموصي أو التوجيه بما يلزم .", "24\nحالات عدم صلاحية التذكرة الطبية للصرف \n- عدم وجود خاتم شعار الجمهورية .\n- عدم وجود رقم التذكرة المسلسل أو رقم المجموعة .\n- عدم وجود أكلاشيه باسم الطبيب وتخصصه )أو كتابته بشكل واضح(\n- عدم وجود توقيع الطبيب بنهاية التذكرة أو بجوار أي تأشيرات أو تعديلات\n- تحرير تذكرة على نموذج مخالف للنموذج الصحيح طبقاً للقانون الخاضع له المنتفع.\n- تحرير تذكرة بتشخيص غير مزمن على النموذج الخاص بالأمراض المزمنة\n- وصف أدوية غير مصرح بها )خارج سلطة الوصف( مع مراعاة القواعد الموضحة بالدليل.\n- وصف أو تكرار علاج شهري لغير الأمراض المزمنة المنصوص عنها تحديداً\n- عدم وجود تشخيص أو كتابته بخالف التعليمات المنظمة\n- استخدام القلم الرصاص\n- عدم وجود البطاقة التأمينية أو الكارنيه\n- عدم وجود اسم المنتفع أو الرقم التأميني )أوعدم تطابق اسم المنتفع كليةً بين التذكرة والبطاقة (\n- انتهاء المدة المقررة لصرف التذكرة )ثلاثة أيام خلاف يوم تحريرها بما في ذلك العلاج الشهري( \n- انتهاء المدة المقررة لتكرار العلاج للأمراض المزمنة \n- تصويب تاريخ الكشف بغير الطريقة الصحيحة .\n- تحرير تذكرة لتكرار علاج الأخصائي أو الاستشاري مع عدم كتابة بيانات التكرار \n- وجود كشط أو تلاعب في الأصناف أو الجرعات أو عدد العبوات مع عدم توقيع الطبيب بجانبها \n) لا يمكن استبدال التوقيع بالأكلاشية حيث لا يوضع الأكلاشية بالتذكرة سوى مرة واحده وفي مكانه (.\n - أن يتقدم لصرف التذكرة شخص لا يجوز له ذلك طبقاً لقواعد الصرف\n- تقديم تذكرة داخلية لا تصرف إلا من الصيدليات المملوكة للهيئة للصرف من الصيدليات المتعاقدة\n مع عدم وجود تعليمات بصرفها", "25\nالأخطاء الممكن حدوثها من بعض الأطباء والصيادلة ومايتبع حيالها من المراجعة الفنية\nم المخالفة تعليمات للصيدلي الغرامة الموقعة )الصرف بالخطأ(\nأولاً : - الأخطاء المتعلقة بنوع التذكرة\n1 تحرير تذكرة لمنتفع مخالفة للقانون التابع له عدم الصرف\nيحصل الحد الاقصى لما يجب أن يسدده المنتفع مناصفة \nبين الطبيب والصيدلي\n2\nتحرير تذكرة طالب بتشخيص مرض غير مزمن على \nيخصم المبلغ الواجب سداده للهيئة كذلك فرق مدة عدم الصرف النموذج المجاني الخاص بالأمراض المزمنة للطلبة\nالعلاج إذا تم وصفه لمدة شهر على الطبيب فقط\n3 تحرير تذكرة علي دفتر تذاكر يخص طبيب أخر تصرف يتم إجراء التحقيق الإداري واتخاذ ما يلزم\nثانياً :الأخطاء والمخالفات المتعلقة بنقص بيانات التذكرة:\n4\nتحرير وصرف التذكرة مع عدم وجود رقم المجموعة أو \nالرقم المسلسل المطبوع على التذكرة و عدم كتابته بمعرفة \nالطبيب و التوقيع\nعدم الصرف خصم قيمة التذكرة مناصفة بين الطبيب والصيدلي\n5\nعدم وجود أكلاشيه باسم الطبيب وتخصصه أو عدم كتابة \nعدم الصرف خصم قيمة التذكرة مناصفة بين الطبيب والصيدلي اسمه واضحاً على التذكرة\n6\nتحرير التذكرة سهواً بدون تدوين أحد هذه البيانات \n) اسم العيادة / جهة العمل / تاريخ الكشف أو كتابته \nبأكلاشيه(\nتصرف بعد التحقق من صحة \nالتذكرة بالاطلاع على البطاقة\nالعلاجية ويدون الصيدلي البيان \nالناقص بالجزء السفلي بالتذكرة\nبالإضافة للبيانات الخاصة به ويترك \nالجزء العلوي كما هو\nتحصل غرامة 25 قرش من الطبيب عن كل بند ناقص\n7 تحرير التذكرة بدون اسم المنتفع أو رقم التأمين الصحي\nعدم الصرف وتعاد لمحرر التذكرة \nتحصل القيمة مناصفة بين الطبيب والصيدلي للاستيفاء\n8\nتحرير وصرف التذكرة مع عدم وجود ختم شعار \nعدم الصرف خصم قيمة التذكرة مناصفة بين الطبيب والصيدلي الجمهورية\n9\nتحرير تذكرة بدون كتابة التشخيص )أو كتابته بخلاف \nعدم الصرف خصم قيمة التذكرة مناصفة بين الطبيب والصيدلي التعليمات المنظمة(\nتحرير تذكرة بدون توقيع الطبيب ) لا يجوز استخدام 10\nعدم الصرف خصم قيمة التذكرة مناصفة بين الطبيب والصيدلي الأكلاشيه في مكان التوقيع كبديل عنه (\nتحرير تذكرة مع عدم كتابة طريقة الاستعمال و الجرعة 11\nاليومية و مدة الاستعمال\nتصرف بما يكفي علاج أربعة أيام \nللممارس\nوسبعة أيام للأخصائي \nو الاستشاري\nتحصيل غرامة 50 قرش من الطبيب محرر التذكرة \n12 تحرير تذكرة مع عدم كتابة التركيز أو العبوة تصرف بأقل تركيز و أقل عبوة تحصيل غرامة 50 قرش من الطبيب محرر التذكرة\nتحرير تذكرة مع عدم توضيح عدد العبوات من الأصناف 13\nصرف عبوة واحدة فقط ـــــــــــــــــ مثل )المراهم / الغسول / النقط ... (\n14 تحرير تذكرة مع عدم تفقيط إجمالي عدد الأصناف كتابة\nتصرف إذا تم التأكد من عدم وجود \nأصناف مضافة\n \nفي حالة اكتشاف أصناف مضافة\nتحصيل غرامة 50 قرش من الطبيب\nخصم قيمة التذكرة مناصفة\nبين الطبيب والصيدلي", "26\nثالثاً -: الأخطاء والمخالفات المتعلقة بتحرير بيانات أو تعديلها بأسلوب خطأ أو مخالف لتعليمات الهيئة\nم المخالفة تعليمات للصيدلي الغرامة الموقعة )الصرف بالخطأ(\n15 استخدام القلم الرصاص في تحرير التذكرة عدم الصرف\nخصم قيمة التذكرة مناصفة بين الطبيب \nوالصيدلي\n16\nتحرير تذكرة بدون استخدام كربون بوجهين \nأو ثني ورقة الكربون\nتصرف بعد التحقق من عدم وجود تلاعب \nيحصل 25 قرش غرامة من الطبيب بها\n17\nتحرير تذكرة بها أدوية خارج سلطة الوصف \nللطبيب\nيصرف المثيل المناسب من الدليل طبقاً\nلسلطة الوصف\nوإن لم يوجد مثيل تعاد التذكرة لمحررها \nفي حالة الصرف بالخطأ \nتحصيل غرامة 50 قرش على الطبيب \nخصم قيمة الأدوية المخالفة مناصفة بين \nالطبيب والصيدلي\n18 وصف أدوية بكميات تزيد عن التعليمات\nتصرف بكميات حسب التعليمات\nفي حال الصرف بالخطأ\nخصم قيمة الكميات الزائدة مناصفة بين \nالطبيب والصيدلي\n19 تحرير تذكرة بها تصويب في تاريخ الكشف \nإذا كان التصويب بالطريقة الصحيحة وهي \nشطب التاريخ كاملاً وإعادة كتابته من\nجديد كاملاً مع التوقيع فإنه يمكن صرف\nالتذكرة \nأما إذا كان التصويب بأية طريقة أخرى \nفلا يجوز الصرف\nخصم قيمة التذكرة على الصيدلي فقط في حالة الصرف بالخطأ \n) حيث يحتمل التعديل بمعرفة المنتفع ( \n20\nوصف أو تكرار علاج شهري للكبار لغير \nالأمراض المزمنة المنصوص عنها تحديداً\nتعاد للطبيب \nلتصويب مدة العلاج\nفي الحالة الوصف لأول مرة يخصم ما يزيد \nعن علاج أسبوع مناصفة بين الطبيب \nوالصيدلي \nوفي حالة التكرار تخصم القيمة بالكامل \nمناصفة بين الطبيب محرر التذكرة \nوالصيدلي\n21\nوصف أكثر من دواء واحد من مجموعات\n) الأدوية المسكنة ومخفضات الحرارة /أدوية \nعلاج الروماتيزم/ موسعات الأوعية الدموية \nالطرفية والمركزية /الأدوية الباسطة \nللعضلات الإرادية/ مجموعة الأدوية المعالجة \nللدوالي/ مجموعة الأدوية المعالجة لارتفاع \nالكوليسترول(\nيصرف دواء واحد من كل مجموعة وفي \nشكل دوائي واحد\nخصم قيمة الأصناف الزائدة مناصفة بين \nالطبيب والصيدلي", "27\nرابعاً -: الأخطاء والمخالفات المتعلقة بإجراءات صرف التذكرة\nم\nالمخالفة تعليمات للصيدلي الغرامة الموقعة )الصرف بالخطأ(\n22 تقديم التذكرة للصرف بعد الموعد المحدد لصلاحيتها عدم الصرف خصم قيمة التذكرة على الصيدلي\n23\nضبط التذكرة أثناء التفتيش بالصيدلية بعد مغادرة \nالمنتفع أو بالمراجعة الفنية بدون توقيع بالاستلام أو \nبدون تدوين السعر\nخصم قيمة التذكرة بالكامل في الصيدليات\nالمتعاقدة\n24\nضبط التذكرة أثناء التفتيش بالصيدلية بعد مغادرة \nالمنتفع أو بالمراجعة الفنية بدون استيفاء أحد أو كل\nالبيانات التالية ) تاريخ الاستلام – اسم المستلم – رقم \nالتأمين الصحي للمنتفع بالكامل – رقم بطاقة الرقم \nالقومي للمستلم – ختم الصيدلية الصارفة – توقيع \nالصيدلي (\nخصم غرامة 25 قرش على الصيدلي لكل \nبيان غير مستوفٍ\n25\nتعديل السعر بعد صرف الدواء ، بدون اتباع القواعد \nالصحيحة لتعديله في حضور المنتفع \nو هي شطبه كاملاً و إعادة كتابته من جديد مع ذكر\nسبب التعديل و توقيع المستلم و الصيدلي \nإلغاء السعر المعدل\n خامساً-: الأخطاء والمخالفات المتعلقة بصور التذاكر\n26\nاكتشاف تذاكر بيضاء بدون إلغاء بمعرفة المراجعة \nالفنية الطبية ضمن الكعب المرتجع \n) لا يدخل فيها باقي الدفتر الذي لم يستخدم لسبب ما ( \nعند مراجعة الكعوب\nغرامة عشرة جنيهات عن كل تذكرة على \nالطبيب صاحب عهدة الدفتر\n27\nوجود عجز في عدد الصور بالكعب أو وجود صور \nغير مدون عليها أية بيانات \nتخصم غرامة على الطبيب صاحب عهدة \nالدفتر بواقع سعر أعلى متوسط لتكلفة التذكرة \nلنفس الطبيب خلال العام السابق للفقد", "28\nإرشادات عامة للصيدليات المتعاقدة\nتلتزم الصيدلية المتعاقدة بالآتي :\n.1 تعلن الصيدلية المتعاقدة عن الخدمة التي تؤديها وعليه يجب وجود لافتة مناسبة على واجهة \nالصيدلية من الخارج بعبارة ) تأمين صحي(\n.2 بصفة عامة فإن التعاقد مع الهيئة يتيح للصيدلية صرف كافة أنواع التذاكرالصالحة للصرف \nالخارجي مع مراعاة النطاق الجغرافي الذي يحدده كل فرع و يستثنى من ذلك :\n- الصيدليات المتعاقدة بالقرى الغير موجود بها عيادة تأمين صحي للكبار فهذه لا يسمح لها إلا بصرف \nتذاكر الطلبة و المواليد فقط \n- في بعض البلاد التي يقل فيها صرف نوع معين من التذاكر ، فللفرع تحديد صيدلية واحدة أو أكثر \nلصرف هذا النوع من التذاكر ، مع إخطار باقي الصيدليات بذلك .\n.3 من الالتزامات الجوهرية حسن معاملة المنتفعين و حسن أداء الخدمة و عدم تفضيل المريض الذي \nيدفع نقداً ، و يعتبر عدم صرف أدوية للمنتفعين لو ثبت وجودها بالصيدلية في نفس الوقت مخالفة صريحة\nللعقد .\n.4 في حساب السعر يتم كتابة السعر لكسور العبوة بالجنيه وكسوره كذلك المجموع \nأما عند حساب الثلث الواجب سداده من المنتفع فيتم رفعه لأقرب كسر من الجنيه\n.5 يراعى تقريب الكميات المنصرفة إلى أقرب شريط أو عبوة فإذا كانت الكمية المقررة 12 كبسولة \nوالشريط 10 فقط يصرف شريط واحد أما إذا كانت الكمية المقررة 15 كبسولة فيصرف شريطين × 10\nأما عبوات الأقراص الغير معبأة كشرائط فلا يجوز فتحها\nوإذا ما وصف الطبيب علبة أقراص غير معبأة في شرائط ( تزيد العبوة فيها عن احتياج المنتفع كأن تكون \n100 قرص والجرعة قرص يومياً لمدة شهر ) مثل النوكسين – ماريفان .... ( فإن الصيدلي يسجل \nببطاقة المنتفع أنه تم صرف عبوة بعدد .... قرص بتاريخ .... مع ختم الصيدلية حتى يراعى \nالطبيب ذلك عند التكرار \nوبالنسبة للأمبولات فإنه عدا الأصناف التي لا يسهل صرفها فرط والغير شائعة الصرف فيتم التقريب إلى \nأصغر عبوة \n.6 يجب أن تكون التذاكر المنصرفة موجودة بالصيدلية باستمرار وبشكل يسهل للمفتش الصيدلي \nالاطلاع عليها أما في الحالات التي تقوم بعض الصيدليات بإرسال تذاكرها لأحد المحاسبين فيجب أن \nتتواجد باستمرار الدفعات التي تم تسجيلها و يكون في الإمكان إحضارالباقي أثناء وجود المفتش .\n.7 كما تلتزم الصيدلية بالحصول على الأدوية من مصادرها القانونية ، و أن تحتفظ بفواتيرالشراء لمدة \nخمس سنوات طبقاً لقانون مزاولة مهنة الصيدلة حيث يحتاج الأمر أحياناً تأكيد حصول الصيدلية على ما\nتم صرفه للمنتفعين من كميات كبيرة من بعض الأصناف وحتى لا يكون العجز عن تقديم ما يثبت شراء \nهذه الكميات كبيرة مبرراً للشك في سلامة و جدية الصرف و بالتالي عدم تجديد التعاقد", "29\n.8 يلزم تدوين البدائل المنصرفة و كذلك السعر نقلاً من العبوة لكل صنف أمام المنتفع و قبل توقيعه\nبالاستلام و بالتالي لا يجوز إجراء أي تعديل في السعر بعد مغادرة المنتفع للصيدلية \n)حتى و لو حدث خطأ في الصرف بصرف دواء مخالف أوكمية أو تركيز مخالف طالما غادر المنتفع \nالصيدلية و لكن في الحالات التي حدث بها خطأ في الصرف مثل صرف علبة بدلاً من علبتين أو صرف\nتركيز مخالف ...( و عاد المنتفع للصيدلية لتصحيح الخطأ أو أمكن الاتصال به و حضر، هنا فقط يمكن\nشطب السعر بالكامل و كتابة السعر الصحيح أعلاه و كتابة سبب التصحيح ويوقع المنتفع و الصيدلي \nو أي تصويب للسعر بدون الالتزام بما سبق ) مثل استخدام المزيل أو تكرار الكتابة فوق السابق (\nيعرض الصيدلية لإلغاء هذا السعر المعدل .\n.9 إذا لم يتم كتابة السعر لصنف واحد أو أكثر وسواء تم ضبط ذلك أثناء التفتيش بعد توقيع المستلم ، \nأو في المراجعة الفنية . فستعتبر الهيئة أن الدواء لم يصرف و لن تتم المحاسبة عليه و لا يقبل أي عذر \nبعدم معرفة السعر \nأما إذا تم كتابة سعر مخالف فستقوم الهيئة باتباع ما يلي :\n- تصويب السعر إذا كان مدوناً في خانات خطأ ) بالقروش و ليس الجنيهات( .\n- تصويب السعر إذا كان المدون هو سعر الصنف قبل أخر تعديل .\n- اعتماد السعر إذا كان يماثل سعر مثيل أو بديل أرخص ) مطابق لتعليمات صرف البدائل ( \nو لم يؤشربه . أما إذا كان السعر لمثيل أو لبديل أغلى لم يؤشر به بالتذكرة فسيتم تعديل السعر للدواء \nالأصلي .\n- اعتماد السعر إذا كان يمثل كمية أو تركيز أقل من نفس الدواء كصرف علبة بدلاً من اثنين أو 250 مجم \nبدلاً من 500 مجم . مع توجيه إنذار للصيدلية لعدم تكرار الخطأ .\n- شطب السعر المدون تماماً في غير الأحوال السابقة حيث سيعتبر أن الدواء المنصرف دواء مخالف .\n.10 يحظرالاحتفاظ بأدوية داخل الصيدلية عليها خاتم التأمين الصحي لنفس الصيدلية أو لصيدليات أخرى \nلأي سبب و يعتبر ذلك مخالفة تعاقدية و جنائية ينطبق عليها القانون 10 لسنة 67 ، كما أن تواجد \nعبوات عليها آثار محو أختام في الصيدلية من المخالفات التي تبرر عدم تجديد التعاقد ، كما يعتبر تواجد \nأدوية عليها أختام وزارة الصحة أو هيئات أو شركات لها نظم علاجية من المخالفات التي تبرر إخطار \nوزارة الصحة لعمل المحضر اللازم و كذلك تبرر عدم تجديد التعاقد مع الصيدلية \n.11 لا يسمح بصرف أدوية عن طريق مندوبين من الشركات أو الهيئات إلا في بعض الحالات للهيئات\nو الشركات البعيدة عن العمران ، و بتصديق كتابي من مدير الفرع المختص بناء على عرض مدير إدارة \nالتموين الطبي و الصيدليات . و يراعى أن يتم توقيع صاحب التذكرة سلفاً بالاستلام و ترسل التذكرة مرفقاً\nبها البطاقة العلاجية مع المندوب الذي يوقع أيضاً بالصيدلية بما يفيد استلامه للعلاج .\n.12 إذا قامت الشركة المنتجة لدواء مدرج بالدليل بتغيير السعر أو العبوة ) مع إلغاء العبوة الأولى ( \nيستمر وصف الدواء طبقاً لنفس القواعد أما إذا تغير الاسم نفسه فيعتبر دواء جديد ويتم عرضه على\nلجنة الدواء للنظر في إضافته إلى الدليل من عدمه", "30\n13 . إذا توافر دواء بالسوق بنفس التركيب والعبوة والتركيز لدواء بالدليل وكان سعره يقل أو يماثل \nالمثيل بالدليل يتم العرض على الإدارة المركزية للتموين الطبي والصيدليات لاتخاذ إجراءات إدراجه بالدليل\n14 . في حالة وصف أدوية مؤثرة على الحالة النفسية و الخاضعة لقرار وزير الصحة رقم 487\nو تعديلاته ، و التي يلزم احتفاظ الصيدلية بالتذكرة ، فإنه يتم صرف التذكرة و إرسالها مع صورة ضوئية \nللعيادة ، حيث يتم اعتماد وختم الصورة ، و التأشير على الأصل بما يفيد تسليم الصيدلية صورة و تحتفظ \nالصيدلية بالصورة مستنداً للتفتيش بمعرفة وزارة الصحة .\n15 . يلتزم صاحب الصيدلية المتعاقد مع الهيئة بإخطار الهيئة عن أي تصرف في الملكية بالمشاركة\nأو بالبيع .\n16 . لا يجوز للمنتفع التنازل عن دواء أو جزء من الكمية ، مقابل إعفائه من سداد النسبة المقررة\nو يعتبر هذا التصرف من الصيدلية مخالفة ، و ليس هناك ما يمنع إذا قرر المنتفع استغناءه عن صنف ما\nلوجوده طرفه ، و أن يتم التأشير على الصنف ) مستغنى عنه ( مع توقيع المنتفع و بالطبع لن يحتسب \nسعره .\n17 . يصرح للصيدلي بصرف الماء المقطر اللازم للحقن و معلقات المضاد الحيوي ، و يتم تحضير المعلق \nداخل الصيدلية بمعرفة الصيدلي ولا يترك ذلك لولي أمر الطالب أو المولود و يضاف سعر الماء المقطر كبند \nمستقل و لا يحتسب ضمن عدد الأصناف المصرح بوصفها .\nثالثا : خطوات تقديم المطالبة الشهرية\n- يراعى فصل تذاكر كل قانون على حدة حيث يقدم لكل قانون مطالبة منفصلة طبقاً للخطوات التالية-:\n- يتم فصل تذاكر كل طبيب على حدة ) سواء ممارس أو أخصائي أو استشاري ( علماً بأن تذاكر التكرار \nيتم إضافتها طبقاً للطبيب محرر تذكرة التكرار .\n- يتم ترتيب مجموعة تذاكر كل طبيب على حدة طبقاً لتاريخ صرف التذكرة تصاعدياً ) وليس تاريخ\nتحريرها ( من 1 إلى نهاية العدد وتوضع كل مجموعة من 50 تذكرة في دوسيه مستقل\nو يراعى تخريم التذاكر من المكان المخصص لذلك يسار التذكرة ، و تثبيتها جيداً ، و بحيث لا تحجب أية\nبيانات ، و يدون علي كل ملف بخط واضح )) اسم الصيدلية / البلد / العنوان/ الرقم الكودي/\nاسم صاحب الصيدلية / نوع المطالبة أي القانون المنصرف بموجبه التذاكر/ نوع التذاكر\n) ممارس – أخصائي – استشاري ( – المدة المقدم عنها المطالبة/ عدد التذاكر بكل دوسيه\nو أرقامها من .... إلى ....((\n- تقوم كل صيدلية بطبع دفاتر فواتير خاصة بها من أصل و صورتين ، و يدون على الفواتير \nاسم الصيدلية و البلد أو الحي – عنوانها بالكامل – اسم صاحبها المتعاقد ثلاثياً – الرقم الكودي للصيدلية \n– رقم مسلسل الفواتير – نوع المطالبة - نوع التذاكر- الفترة المقدم عنها الحساب", "31\nو تقسم الفاتورة إلى الخانات الرأسية التالية -:\nمسلسل ) رقم المسلسل للتذكرة الموضوع بمعرفة الصيدلية (\nاسم المنتفع أو الطالب أو المولود .\nالرقم التأميني للمنتفع أو الطالب أو المولود .\nرقم التذكرة المسلسل المطبوع عليها . تاريخ تحرير التذكرة .\nإجمالي قيمة الأدوية \nالمبلغ المسدد\nالباقي .\nاسم وتخصص الطبيب .\nو في نهاية الفاتورة يتم جمع الخانات الحسابية رأسياً و توقيع صاحب الصيدلية و ختم الصيدلية \nو يراعى عدم ترحيل إجمالي الفاتورة و إنما تستقل كل فاتورة بمجموعها لتسهيل إجراء التصويب عند \nالمراجعة .\nيتم حصر إجمالي المطالبة لتذاكر الممارس / الأخصائي / الاستشاري على نموذج تفريغ للفواتير كالتالي\n) من أصل و صورتين (.\nصيدلية ............ لصاحبها ................\nفاتورة إجمالية لتذاكر ) الممارس / الأخصائي / الاستشاري ( قانون ) ....... (\n عن الفترة من ......... إلي ..........\nالإجمالي المسدد من المنتفع الباقي رقم الفاتورة\nقرش جنيه قرش جنيه قرش جنيه\n1\n2\n3\n4\n5\nالمجموع\nتوقيع صاحب الصيدلية .......... ختم الصيدلية ...........\nو من الطبيعي في حالة وجود فاتورة واحدة فقط ، لا داعي لعمل النموذج مع مراعاة أي تعليمات تفصيلية \nصادرة عن الفروع بخصوص تحرير المطالبات \n مع فصل تذاكر المزمن المجاني للطلاب عن تذاكر الأخصائي الغير مزمن", "32\n ثم عمل كشف مطالبة نهائي من أصل و صورتين على النموذج كالتالي -:\n اسم الصـيدلية ..... عــنــوانـــــها ..... الرقم الكودي ..... اسم صاحبها ثلاثياً ........\nالمطلوب من الهيئة العامة للتأمين الصحي فرع ..........\nعن الفترة من ....... إلي ....... قانون ) (\nعدد النوع\nالتذاكر\nعدد \nالفواتير\nعدد \nالدوسيهات\nالإجمالي المسدد الباقي\nق ج ق ج ق ج\nممارس\nأخصائي\nاستشاري\nالإجمالي\nفقط مبلغ وقدره ......................... لا غير\n- توضع الفواتير و الكشوف و المطالبة النهائية في ملف مستقل و تسلم المطالبة للفرع المختص \nو يكرر ما سبق لكل قانون ، \nحيث يسلم لكل قانون على حدة-:\nملف أو أكثر بها تذاكر الممارس .\nملف أو أكثر بها تذاكر الأخصائي و تكرار علاج الأخصائي .\nملف أو أكثر بها تذاكر الاستشاري و تكرار علاج الاس يق مع المخالف و صاحب \nالصيدلية المتعاقدة ، بمعرفة لجنة تشكل بكل فرع برئاسة مدير إدارة التموين الطبي و الصيدليات ، \nو عضوية صيدلي من العاملين بالفرع و أحد أعضاء الشئون القانونية بالفرع ، و يتم إخطار النقابة \nالفرعية المختصة للصيادلة لإيفاد مندوباً عنها لحضور التحقيق ، و في حالة عدم حضوره ) وعدم \nموافقة المخالف على التحقيق بدونه( يخطر للحضور مرتين متتاليتين بخطاب مسجل بعلم الوصول \nو في حالة عدم حضوره بعد الإخطار الثاني ، يكون انعقاد اللجنة صحيحاً بدونه.\n.5 بالنسبة للمخالفات التي عقوبتها إيقاف ، فإنه يحق للهيئة الإيقاف التحفظي الفوري للتعامل مع الصيدلية \n، لحين انتهاء التحقيقات ، لمدة لا تزيد عن شهر )إذا كانت العقوبة إيقاف لغاية عام( \nو شهرين )إذا كانت العقوبة إيقاف لغاية ثلاث سنوات( و حتى انتهاء التحقيقات )إذا كانت العقوبة إيقاف \nأكثر من ثلاث سنوات أو تخضع للقانون 10 لسنة 1967( ، و لا يتم الإيقاف التحفظي إلا إذا كانت أدلة \nالمخالفة قوية و بعد موافقة مدير الفرع ، و يخطر صاحب الصيدلية بهذا الإيقاف التحفظي.", "34\n.6 إذا كانت المخالفة جريمة جنائية ينطبق عليها القانون رقم 10 لسنة 67 فإن إبلاغ النيابة العامة أو حكم \nالقضاء الصادر لا يخل بحق الهيئة في توقيع الجزاءات التعاقدية المنصوص عليها بهذه اللائحة حتى لو \nحفظت النيابة الشكوى أو صدر حكم القضاء بالبراءة ، حيث تختلف ضوابط إثبات الجريمة الجنائية عنها \nفي المخالفة التعاقدية.\n.7 يتم توقيع الجزاءات التعاقدية المنصوص عليها بهذه اللائحة أياً كان مرتكب المخالفة بالصيدلية سواء\nأكان المخالف صاحبها أو مديرها أو أي عامل أو موظف بها و يتم توقيع الجزاء على الموقع على \nالتعاقد مع الهيئة ، حيث أنه هو المسئول أمام الهيئة ، أما المخالفات الجنائية فهي شخصيه في حق \nمرتكبها فقط بالإضافة إلى توقيع العقوبة التعاقدية على صاحب الصيدلية.\n.8 إذا ارتكب الطرف الثاني إخلالاً في تنفيذ التعاقد لم يرد صراحة بهذه اللائحة يؤخذ رأى الشئون القانونية\nبالفرع لإبداء الرأي في تحديد البند الذي يطبق على المخالفة.\n.9 تخصم الغرامة المالية التي توقع على الطرف الثاني من مستحقاته لدى الطرف الأول – و إذا لم توجد له \nمستحقات ، تخصم من قيمة التأمين و يلتزم الطرف الثاني باستكمال التأمين خلال شهر على الأكثر من \nتاريخ إخطاره ، و إلا يعتبر التعاقد مفسوخاً.\n.10 تسقط المخالفات التي عقوبتها إنذار أو غرامة مالية فقط بعد مرور سنة واحدة من تاريخ ارتكاب \nالمخالفة ، و تعتبر في حالة التكرار مرة أولى ، أما المخالفات التي عقوبتها إيقاف أياً كانت مدة\nالإيقاف فلا تسقط بالتقادم و تعتبر في حالة التكرار مرة تالية.\n.11 في حالة ارتكاب الصيدلية المتعاقدة التي سبق أن وقع عليها جزاء الإيقاف عن التعامل لمدة خمس \nسنوات لأي مخالفة عقوبتها الإيقاف خمس سنوات يلغى التعاقد نهائياً مع عدم جواز التعاقد معها\nمستقبلاً .\n.12 في حالة تكرار المخالفة بعد المرة الثالثة )و تكون العقوبة ما زالت إيقاف مؤقت( تضاعف مدة \nالإيقاف ) مع مصادرة التأمين( كل مرة حتى تصل للإيقاف خمسة سنوات بعدها يتم إلغاء التعاقد نهائياً.\n.13 حيث أن التعاقد في حالة الإيقاف المؤقت لا يكون ملغياً و إنما موقوفاً بشكل مؤقت فإنه يتعين إعادة\nمعاينة الصيدلية بعد الإيقاف لمدة عام أو أكثر قبل إعادة التعاقد للتحقق من صلاحية الصيدلية و حسن \nالسمعة", "35\nرابعاً : لائحة المخالفات و الجزاءات للصيدليات المتعاقدة\n)و يعتبر ملحق لعقد توريد و صرف أدوية من الصيدليات(\nتنفيذاً لبنود العقد يكون من حق الطرف الأول ) الهيئة ( توقيع الجزاءات التعاقدية التالية عن المخالفات \nالمنصوص عنها و ذلك مع عدم الإخلال بحق الطرف الأول طبقاً للتعاقد في عدم تجديد التعاقد للأسباب التي\nتقتنع بها الهيئة ، دون أن يكون للطرف الثاني أي حق في الاعتراض أو التعويض .\nم المخالفة\nالجزاءات\nأول مرة ثاني مرة ثالث مرة\n1\nمراقبة الصرف بمعرفة التفتيش الصيدلي \nويتبين صرف أدوية مخالفة في المفعول بطريق \nالخطأ ، دون إضرار بحالة المنتفع ، و تدوين \nسعر الدواء المنصرف بالفعل.\nإيقاف التعامل ستة شهور غرامة من 20 إلى 40 جنيه غرامة من 50 إلى 100 جنيه\nو مصادرة التأمين\n2\nمراقبة الصرف بمعرفة التفتيش الصيدلي \nويتبين صرف دواء بديل رغم توافر الدواء \nالأصلي المدون بالتذكرة ) المسموح بصرفه ( \nبالصيدلية نفسها \nإيقاف التعامل ستة شهور غرامة من 20 إلى 40 جنيه غرامة من 50 إلى 100 جنيه\nو مصادرة التأمين\n3\nعدم تقديم تذاكر التأمين الصحي للمفتش فور \nإيقاف التعامل ستة شهور غرامة من 20 إلى 40 جنيه غرامة من 50 إلى 100 جنيه طلبها .\nو مصادرة التأمين\n4\nمراقبة الصرف بمعرفة التفتيش الصيدلي \nويتبين عدم صرف الدواء للمنتفع رغم توافره \nبال  disease progression or drug \ntoxicity.", "43\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Pemetrexed) protocol:\n1- Patients with pathologically confirmed diagnosis of Malignant \nMesothelioma (Epithelial Type).\n2- Patients with good performance status (ECOG 0-2)\n3-Patients with no contraindication to the drug.\n4- In combination with Platinum based chemotherapy.\n5- Patients should receive premedication with folic acid & Vitamin B12 \nsupplement to avoid serious complications.\n6-Patients should have normal values of renal & liver functions as well as \nblood picture.\n7-Patient should have a baseline recent CT chest.\n8- Patient should be assessed for response after 3 cycles.\n9- Responding patients continue another 3 cycles with reevaluation till \nreaching maximum response.\n10- Non- responding or relapsing patients should receive another line of \ntherapy according to their condition.\n11- Patients should not have a second malignancy.\n12- Patients developing severe side effects to the drug should discontinue \ntreatment with the drug.", "44\n(Exemestane) Protocol\n1-Patients with confirmed breast cancer\n2- ER, PR positive tumors\n3- Metastatic breast after prior hormonal therapy\n4- Base line radiography and scans before starting treatment\n5- No contraindications to the drug\n6- No serious co morbidities\n7- No other malignancy\n8- Re-evaluation after 3 months\n9- Responding patients continue treatment\n10- Discontinue treatment in case of disease progression or intolerable toxicity.", "45\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Bevacizumap) Protocol\nAVASTIN in Metastatic Cancer Colon: \n1-Patients with pathologically confirmed adenocarcinoma of colon.\n2- Patients with radiologically proven metastatic cancer colon.\n3- Patients with no prior therapy in the metastatic setting.\n4-Good Performance status ECOG: 0-2\n5- Patients with adequate Blood picture, liver functions & renal functions.\n6-Patients with normal coagulation profile to avoid the possibility of bleeding.\n7-No history of active bleeding\n8-No serious co-morbidity\n9- Patients with no history of intestinal perforation or any predisposing factor \nto develop perforation.\n10-Patients with no hypersensitivity or medical contraindication to the drug.\n11-Eligible patients will receive 3 cycles of Avastin containing regimens \nfollowed by evaluation.\n12-By the end of 3 cycles, patients will be evaluated radiologically & \nlaboratory for response.\n13-Responding patients will continue for another 3 more cycles and \nreevaluated.\n14- Non responding patients will discontinue the drug.\n15-Patients developing grade 2/3 Toxicity should stop the drug.", "46\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Liposomal doxorubicin) Protocol\nPatients with pathologically confirmed mucinous or serous ovarian \nadenocarcinoma\nGood Performance status: 0-2.\nAdequate hematologic values.\nNo serious co -morbidities.\nNo other malignancy\nAdequate Renal & liver functions\nPrevious Taxane based chemotherapy\nBaseline chest, abdomen & pelvis radiography.\nBase line tumor marker: CA, 125.\nPatients would receive 3 cycles.Then, evaluation.\nComparative radiography & tumor marker for evaluation\nResponding patients continue 3 more cycles.\nStop therapy if there is disease progression or treatment related toxicity.", "47\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Cetuximab) Protocol\n- Patients with confirmed diagnosis of colonic adenocarcinoma.\n- Patients with proved metastatic/ recurrent disease with CTS, MRI, or \nPET/CT.\n-First line metastatic disease.\n-Good Performance status ECOG: 0-2.\n-Patients with confirmed all RAS wild aggressive genes (K-RAS & N-RAS).\n- Patients with normal blood values.\n- Patients with adequate liver & renal functions.\n- No serious co- morbidly.\n- No medical contraindications to the drugs.\n- No other malignancy.\n- Patients would receive 3 cycles, then reevaluated.\n- Responding patients will receive another 3 more cycles.\n- Non - responders should discontinue the drug.\n-Patients developing grade3/4 drug related toxicity should discontinue the\ndrug.", "48\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Trastuzumab) Protocol. \nPatients with NON METASTATIC BREAST CANCER when they have:\n 1-Pathologically Proven Breast Cancer.\n 2-Confirmed Her-2 positivity.\n 3-Axillary lymph nodes involvement. (Positive lymph nodes).\n 4-high risk tumor with negative lymph node.\n 5-Absence of serious co-morbid diseases.\n 6-Absence of any contraindications for use of the drug.\n 7-Adequte cardiac status with ejection fraction of >55%.\n Patients with METASTATIC BREAST CANCER when they have:\n 1-Patients with histologically confirmed breast cancer.\n 2-HER-2 score 3+ ve by FISH.\n 3- Measurable metastatic disease.\n 4-NO PRIOR TARGETED THERAPY FOR BREAST CANCER.\n 5-Normal cardiac functions.\n 6-Normal CBC.\n 7-Adequate liver & renal functions.\n 8-Patients would receive 3 cycles, then reevaluated.\n 9- Responding patients will continue 3 more cycles.\n 10- Non responding patients should discontinue the drug.\n 11-Patients developing gr.3/4 toxicities should discontinue the drug.", "49\n PRECAUTIONS for the drug use:\n1. Patients should be monitored regularly for cardiac functions.\n2. Fall of ejection fraction by ~10% before any cycle should be taken in \nconsideration that may necessitate discontinuation of Herceptin.\n3. Patients with left sided breast cancer who received radiation therapy \nthat may affect heart condition should be closely monitored for \ntreatment related cardiac toxicity.\n4. Patients should have regular evaluation during therapy as \ndevelopment of disease progression or metastasis necessitates another \ntreatment option.\n adjuvant therapy with herceptin:\n One year (16-17) adjuvant treatment, so for patient did not develop \ncardiac dysfunction or disease progression.", "50\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Rituximab) protocol\npatients with pathologically confirmed: Large cell lymphoma\nCD-20 positive\nGood Performance status: 0-2.\nAdequate hematological count\nAdequate Renal & Liver functions\nFirst line therapy\nBase line evaluation CT scans.\nNo virus B infection\nAbsence of serious co - morbidities.\nNo Other malignancy\nEvaluation after 3 cycles\nResponding patients would continue the drug for more 3 cycles\nNon responders should stop the drug", "51\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Sorafenib) protocol\n Patients would be eligible if they have:\n 1- Confirmed diagnosis of Hepatocellular carcinoma.\n 2- Good performance status: ECOG. 0-1.\n 3- No liver cirrhosis leading to elevation of liver enzymes or liver \nimpairment\n 4- Child A liver disease.\n5- Prothrombin concentration > 70%\n6-Total bilirubin <1.5\n7-Serum albumin within normal limits\n 8-Liver function within normal range.\n 9-Renal function within normal range.\n 10- No ascites.\n 11-No other malignancies.\n 12-No known hypersensitivity or medical contraindication to the drug.\n 13-Evaluation of response after 2_3 months.\n 14-adequate Blood picture Values:\n Hg ~10 mg/ ml\n No Leucopenia: TLC~ 4000\n No thrombocytopenia: Platelet count ~100.000\n 15- No known hypersensitivity to the drug.\n 16- No severe toxicity related to the drug.\n 17- No other serious Co- morbidities.", "52\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Dasatinib) Protocol\n1-Patients with chronic Myeloid Leukemia\n2- Patients progressing after first line therapy\n3- Patient should have a recent BCA-ABL\n4-Adequate Renal & Liver functions\n5- Monitoring of blood values and chest conditions \n(Pneumonitis a possible side effect of the drug)\n6- Chest radiography in case of cough and dyspnea \n7- Monitoring of BCR-ABL every 3 months\n8- Responding patients, continue treatment with regular Monitoring\n9-Discontinue treatment in case of disease progression or intolerable toxicity", "53\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Sunitinib) Protocol\nPatients with confirmed metastatic Renal Cell Carcinoma\nFirst line metastatic therapy\nGood performance status: ECOG:0-2\nAdequate hematologic values\nAdequate Renal & Liver functions\nNormal levels of T3,T4,TSH\nNormal echocardiogram\nNo serious co- morbidity\nNo other malignancy.\n Treatment is given with standard schedule of 4 weeks treatment/ 2 weeks \noff.\nEvaluation of therapy after 3 months\n Evaluation of treatment related toxicity: especially cardiac functions,T3, \nT4,TSH\nResponding patients would continue 3 months, then reevaluated.\n Patients having disease progression or treatment related toxicity should \nstop the drug.", "54\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Nilotinib) Protocol\n1-Patients with chronic Myeloid Leukemia\n2- Patients progressing after first line therapy\n3- Patient should have a recent BCA-ABL\n4-Adequate Renal & Liver functions\n5- Monitoring of blood sugar (As Diabetes: a known side effect of the drug)\n6- Monitoring of cardiac conditions\n7- Monitoring of BCR-ABL every 3 months\n8- Responding patients, continue treatment with regular Monitoring\n9-Discontinue treatment in case of disease progression or intolerable toxicity", "55\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Temozolomida) Protocol\nPatients with confirmed high grade astrocytoma.\n Diagnosis confirmed by pathology or MR Spectroscopy if surgery is not \npossible\nGood Performance status: 0-2. ECOG.\nAdequate hematologic values\nAdequate renal & liver functions\nNo serious co morbidly\nNo other malignancy\nRecent MRI brain after surgery\nPatients would receive 3 cycles\nRe-evaluation after 3 cycles by comparative MRI.\nResponding patients would continue 3 more cycles\nNon responding ,progressing patients should continue the drug", "56\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Panitumumab) Protocol\n- Patients with confirmed diagnosis of colonic adenocarcinoma.\n- Patients with proved metastatic/ recurrent disease with CTS, MRI, or \nPET/CT.\n-First line metastatic disease.\n-Good Performance status ECOG: 0-2.\n-Patients with confirmed all RAS wild aggressive genes (K-RAS & N-RAS).\n- Patients with normal blood values.\n- Patients with adequate liver & renal functions.\n- No serious co- morbidly.\n- No medical contraindications to the drugs.\n-No other malignancy.\n- Patients would receive 3 cycles, then reevaluated.\n- Responding patients will receive another 3 more cycles.\n- Non - responders should discontinue the drug.\n-Patients developing grade3/4 drug related toxicity should discontinue the \ndrug.", "57\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Bortezomib) protocol\n1- Patients with confirmed Multiple Myeloma:\n -Bone marrow examination\n -Quantitative IGA, IGG, IGM\n - B2 - Microglobulin\n - IMMUNOFIXATION\n - Skeletal Survey / PET scan\n2-Patients not responding or progressing on Standard chemotherapy \nregimens.\n 3- Patients with impaired renal functions.\n 4- Patients should be evaluated for response to therapy after each \ntreatment period by doing the previously mentioned investigations compared\nto results before therapy.\n 5- Responding patients (confirmed by bone marrow, B2 microglobulin, IGA, \nIGG, IGM)\nWill continue treatment with reevaluation.\n 6- Non responding patients or those with treatment related toxicity should \ndiscontinue the drug.", "58\nأدوية لا تصرف إلا بموافقة اللجنة العليا للدواء\n(Pazopanib) Protocol\nPatients with confirmed metastatic Renal Cell Carcinoma\nAdequate hematologic values\nNormal kidney & liver functions\nGood performance status of ECOG :0-2\nTreatment is given as first line metastatic\nBaseline chest ,abdomen & pelvic radiography\nNo serious co -morbidities\nNo other malignancy\nRe-evaluate after 3 months of therapy.\nAssessment of treatment related toxicity especially elevation of liver \nenzymes ( known side effect of the drug)\nTreatment should be discontinued in case of disease progression or drug \ntoxicity.", "59\n(Zoledronic acid) Protocol\n1- Patients with confirmed Mutiple Myeloma.\n2- Confirmed bone affection by skeletal survey \\ PET/CT.\n3-Patients With adequate Renal function (Urea, Creatinine, and creatinine\nclearance)\n4-No hypocalcemia before starting therapy\n5- Treatment to be given every 4 weeks for the first year & every three months \nfor the second year\n6- Monitoring of dental health (Osteonecrosis of jaw is a possible side effect)\n7- Monitoring of serum calcium during treatment (Hypocalcemia is a possible \nside effect)", "60\n)Oxaliplatin) protocol\nيتم وصف عقار Oxaliplatin لمرضى الأورام في حالات Cancer Rectal Colo\nعلى أن يتم وصفه بالضوابط الآتية -:\n- خط العلاج الأول يتكون من فلورويوراسيل ولوكوفيرين \n- في حالات ارتجاع الورم موضعياً أو في حالات انتشاره ) الكبد ، العظام ، الرئة ( يتم وصف\n Oxaliplatin على أن تكون الحالة العامة للمريض جيدة ) وظائف الكبد ، تحاليل الدم ( ويتلقى \nالمريض جرعتين يتم بعدها تقييم مدى الاستجابة \n- في حالة حدوث استجابة وعدم وجود تدهور عام بصحة للمريض يستمر العلاج \n- في حالة عدم الاستجابة أو حدوث تدهور في الحالة العامة للمريض يوقف العلاج بهذا العقار", "61\nتعليمات وصف عقار الـ .tab acetate Cyproterone\n يوصف دواء أندروكيور 50 مج أقراص لحالات أورام البروستاتا بجرعة قرص مرتين يومياً كخط علاج \nثاني في حالة عدم استجابة المريض لأقراص فلوتاميد 250 مجم بجرعة قرص 3 مرات يومياً\n) بعد الجراحة (\nتعليمات وصف عقار الـ mg 500 Capecitabine\n يوصف عقار mg 500 Xeloda لمرضى الأورام في الحالات التالية -:\n-1 حالات سرطان الثدي المصابة بثانويات في الأنسجة الرخوة \n)SOFT TISSUE METASTASIS IN BREAST CANCER( \n-2 حالات أورام القولون المصابة بثانويات في الكبد \n)LIVER METASTASIS IN CANCER COLON ( \n على أن تكون الجرعة الشهرية علبة واحدة 120 قرص بمعدل 8 اقراص يومياً لمدة 15 يوم .", "62\n البروتوكول الأساسي للكيماوي\nبالنسبة لأورام الرئة للحالات الغير قابلة للاستئصال الجراحي يراعى الآتي -:\n-1 يعطى للمريض البروتوكول الأساسي للكيماوي ويتكون من بلاتينول + فيبسيد لمدة 4 جرعات بالإضافة \nللعلاج الإشعاعي \n-2 يعاد تقييم الحالة -:\n- في حالة وجود استجابة للعلاج ) أكثر من 50 % ( يعطى باقي الجرعات \n- في حالة عدم وجود استجابة ) أقل من 50 % ( وحالة المريض العامة جيدة 1.2 performance \nيعطى المريض جرعتين من أحد البروتوكولات الآتية -:\n-1 جيمزار + بلاتينول \n-2 تاكسول + بلاتينول \n-3 تاكسوتير + بلاتينول \nويعاد تقييم الحالة طبقاً للاستجابة", "63\nBiologic therapy for Rheumatoid Arthritis\n1) Biologic therapy is indicated for those patient failed to be controlled \n(moderate to high disease activity and having one or more of poor prognostic \nfactors) by the above treatment regimen for more than continuous 6 months. It \nis given in addition to prednisolone 5-10 mg daily, and MTX or leflunomide, \n2) Tuberculin, HBsAg, and HCV-Ab testing are mandatory before prescribing \nbiologic therapy, \n3) Biological drugs available are used in the following order: \na. 1st. line Etanercept (Enbrel syringe 50mg) once weekly for three months, \nb. 2nd. Line Golimumab (Simponi pen 50mg) once monthly for three months, \nOR \nAdalimumab (Humira 40 mg syringe) once every 2 weeks, for three months, \nc. 3rd. line Infliximab (Remicade vial 100mg) 3 vials IV infusion over 2 hours \nwith premedication by anti-histaminic and hydrocortisone before each \ninfusion. The doses schedule is zero, 2, 6 weeks then every 8 weeks, for three \nmonths, \nd. 4th. Line Tocilizumab (Actimra vials 400+200 mg) by IV infusion over one \nhour, once monthly, for three months, \n4) it is totally not allowed to start by the second line EXCEPT if the first line \ndrug is ineffective or contraindicated) \n5) If there is contraindication to or side effects from MTX and leflunomide, \ngive IL-6 inhibitor (Tocilizumab) + the rest of the protocol. \n6) After achieving the target continuously for 3 months (remission or low \ndisease activity), start tapering of the biologic drug by either halving the dose \n(better) or doubling the interval (which is applicable according to the available \nbiologic doses preparation) & continue other medications, \n7) Re-evaluate after another 3 months, \na) If the disease flared, resume the same biologic drug by the original dose \nbefore tapering with follow up every 3 months till achieving the target \ncontinuously for 3 months (remission or low disease activity), then start \ntapering again of the biologic drug by either halving the dose (better) or \ndoubling the interval (which is applicable according to the available biologic \ndoses preparation). \nb) If the disease still in remission, stop the biologic drug and continue the other \nnon-biologic drugs and steroids with follow up every 3 months.", "64\nBiological therapy for ankylosing spondylitis\n1) Biological therapy (Anti-TNF or IL-17 blocker) for 12 weeks is indicated \nfor: \na) Patients with persistently high disease activity despite conventional \ntreatments (above measures without significant improvement) \nb) Patients with extra-articular manifestations, for example, psoriasis, uveitis \nand/or IBD not responding to above and local treatment, \n2) Tuberculin, HBsAg, and HCV-Ab testing are mandatory before prescribing \nbiologic therapy, \n3) In selection of the biological drug should be in the following order:\na. 1st. line: therapy: Secukinumab (Cosentyx 150 mg pen) without loading \ndose i.e. 3 doses over three months, \nb. 2nd. Line: Etanercept (Enbrel syringe 50mg) once weekly for three months, \nc. 3rd. line: Golimumab (Simponi pen 50mg) once monthly for three months, \nOR \nAdalimumab (Humira 40 mg syringe) once every 2 weeks, for three months, \nd. 4th. Line: Infliximab (Remicade vial 100mg) 3 vials IV infusion over 2 hours \nwith premedication by anti-histaminic and hydrocortisone before each \ninfusion. The doses schedule is zero, 2, 6 weeks then every 8 weeks, for three \nmonths, \ne. 5th. Line: Secukinumab (Cosentyx 150 mg pen) with loading dose i.e. 6 doses \nover three months, \n4) Extra-articular manifestations, as uveitis and IBD, should be considered as \nTNF receptors (Et \nHgb ˃12", "80\nGilenya ( Fingolimod) \n0.5 mg capsule\nSecond-line treatment for relapsing remitting multiple sclerosis \n(RRMS) according to EU but first line treatment in the USA\nIndications:\n1. RRMS\n In patients who have failed to respond to a full and adequate course \n(1 year) of beta interferon\n In patients who have had at least 1 relapse in the previous year while on \ntherapy and have at least 9 T2 hyper intense lesions on MRI or at least\n1 G+\nlesion .\n Also in patients with increased relapse rate or ongoing severe relapses ,\nas compared to the previous year\n2. Aggressive MS\nRRMS with one or more of the following features;\na) EDSS score of 4 within 5 years of onset\nb) Two or more relapses with incomplete resolution in the past year\nc) More than 2 MRI studies showing new or changing T2 lesions or \nG+\nlesions despite treatment\nd) No response to therapy with one or more of DMTs for up to 1 year \n3. Contraindications to interferon-beta(depression-allergy)\n4. Progressive relapsing MS(EDSS does not exceed 4)", "81\nINTRAVENOUS IMMUNOGLOBULIN (IVIG)\nCONDITIONS FOR WHICH INTRAVENOUS IMMUNOGLOBULIN USE IS\nAPPROPRIATE AND IS CONSIDERED THE HIGHEST PRIORITY BECAUSE OF\nA RISK TO LIFE WITHOUT TREATMENT\n(Clinical guidelines for IMMUNOGLOBULIN USE\n2nd EDITION UPDATE SCOTLAND, March 2012)\nI. PRIMARY AND SECONDARY ANTIBODY DEFICIENCY STATES:\n1. Primary immunodeficiencies (associated with significant antibody \ndefects): Initiate at 0.4–0.6 g/kg/month; dose requirements \nmay increase and should be based on clinical outcome.\n2. Thymoma with immunodeficiency: Dose as above.\n3. HSCT in primary immunodeficiencies: Dose as above.\n4. Specific antibody deficiency: Dose as above.\nII.HAEMATOLOGY:\n1. Alloimmune thrombocytopaenia (foeto‐ maternal/neonatal):\nMaternal: 1 g/kg weekly throughout pregnancy. Neonatal: 1 g/kg; \noccasionally >1 dose required if thrombocytopaenia persists.\n2. Haemolytic disease of the newborn: 0.5 g/kg over 4 hours.\n3. Imm
