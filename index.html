"88\nGrowth Hormone Treatment\nIndications:\n1. Short stature due to growth hormone deficiency.\n2. Turner Syndrome\n3. Hormonal replacement after treatment of brain tumor\n4. ISS with height less than -4SD with GV less than -1SD after 6 -12 months \nof observation \nDiagnostic Criteria for GH deficiency (GHD):\n1. Short stature (height <-3SD) that is inappropriate for the target centile\nrange\n2. Subnormal growth-rate; as a rough guide less than 5cm per year in\na prepubertal child over 2 years of age, to be calculated over a period of \nNOT less than 6 months \n3. Normal karyotype in girls\n4. Bone age delay <2SD\n5. Normal thyroid functions. If abnormal, thyroid functions must be \nnormalized with treatment before performing GH provocation\n6. Subnormal GH response to 2 provocation tests (insulin and clonidine). \nPeak GH < 7 ng/ml. Cortisol is to be measured in the 60 minute sample of \nan insulin tolerance test\n7. For the following categories one test is sufficient:\na. Defined CNS pathology\nb. History of irradiation\nc. Multiple pituitary hormone deficiency (MPHD)\n8.MRI sella turcica to be done on individual basis\nExclusion Criteria:\n1. Dysmorphic syndrome associated with short stature \n2. Skeletal dysplasia \n3. Systemic diseases causing growth failure \n4. Children under corticosteroid treatment \n5. Familial short stature \nMales with a bone age of 15.5 years or more and females with \na bone age of 13.5 years or more", "89\n6. Children with a known risk of malignancy, e.g. chromosomal \nabnormality such as Down and Bloom syndromes\n7. Evidence of brain atrophy \n8. Growth failure due to diabetes\n9. I.Q less than 75%\nDosage:\n Dose for Growth hormone deficiencies :0.03 mg/kg/day or 0.09 IU/kg/day\n Dose for ISS: 0.04 mg/kg or 0.12 IU/kg/day.\nGH should be given 7days per week by subcutaneous injection. Results may \nworsen if frequency is reduced.\nResponse Criteria and Termination of Therapy:\n1. Minimum height velocity of 5cm/year\n2.In cases where the above criterion is not met, an increased dose of GH \nmay be approved to a maximum of 0.04 mg/ kg/day or 0.12 IU/kg/day. If \nresponse is inadequate after a six-month period at the maximum dose, \ntreatment should cease.\n3. No improvement of the standard deviation score after 1 year of treatment \nin prepubertal children or according to bone age.\n4. Growth hormone treatment should be discontinued once growth velocity \ndeclined to ≤ 2 cm/year (the bone age has reached 15.5 years in males \nand 13.5 years in females. This skeletal maturity represents 97.5% of \nestimated final height)\n5.In general, treatment with human growth hormone will cease once the \npatient has reached the 10th adult height centile (females 155 cm; males \n165 cm) \n6.Turner Syndrome\nGirls with Turner Syndrome will be considered for therapy, if their height is at \nor below the 75th centile on the Turner specific chart.", "90\n1. Karyotype\n2. Bone age\nTreatment: \n GH: 0.05 mg/kg/day (0.15 IU/kg/day). GH should be given at least \n6 days per week by subcutaneous injection. Results may worsen if \nfrequency is reduced.\n Estrogen replacement: Started at a chronological age of 13 years. The \nstarting dose of depot estradiol (Folone) IM is 0.2 mg; the dose is then \nincreased at successive 6-month intervals by 0.2 mg initially and by 0.5 \nmg after a dose of 1.0 mg is reached, to a maximum of 3.0 mg monthly. \nProgestin is not prescribed until after 4 yr of estradiol therapy unless \nirregular menstrual bleeding occurs.\nResponse Criteria and Termination of Therapy:\nIn girls with Turner Syndrome, the growth velocity should exceed that \nnormally expected in untreated Turner girls with reference to the Turner \nspecific chart (at least 3 cm/year) \nTherapy may be continued until a satisfactory height has been attained or \nuntil the growth rate falls to (bone age is more than 14 years and the patient’s \nheight has increased by) ≤ 2 cm/year. \nN.B.\nFor children with a height SD <-4 and normal GH provocation test, if a growth \nvelocity calculated over a 6 month period is subnormal with decline of the \nstandard deviation < 0.5, a trial of GH treatment for 6 months is started. If the \nchild demonstrates a good response i.e. improvement of GV and height SDS, \nthen therapy is continued. If no improvement is documented after 6 months, \ntherapy is terminated.", "91\n-3 أدوية الكبد", "92\nHBV Protocol\nInclusion criteria for treatment\n• Age ≥ 18 years \n• HBsAg (+ve) for more than 6 months. \n• HBV DNA ≥ 2000 IU/ML. \n• ALT elevation above upper limit of normal on 2 successive occasions \nwithin 3 to 6 months.\nRole of Liver biopsy \nLiver biopsy is used to guide treatment decisions for patients who show: \n• HBV DNA ≥ 2000 IU/ML with persistently normal ALT. \n• HBV DNA < 2000 IU/ML with persistently elevated ALT. \n• HBV DNA < 2000 IU/ML with normal ALT and there is clinical \nevidence of liver disease or a family history of HCC \n Treatment is recommended for those \n with A2 and / or F2 or more (Metavir score)\nImmunotolerant cases \n•Patients under 40 years of age who are: \n– HBeAg positive. \n– With very high viral load. \n– Persistently normal ALT. \n•these patients are not candidate for treatment. \n• Follow up is recommended: \n – ALT every 3 months.\n – Quantitative HBV DNA by PCR every 6 months. \n• Consider liver biopsy if ALT becomes elevated on 2 successive \noccasions or in patients with a positive family history of HCC. \n Medications\n First line therapy for all naïve patients is:\n Entecavir 0.5 mg once daily or Tenofovir 300mg once daily\nFor Patients already on treatment \n•CHB patients on Lamivudine and HBV DNA is undetectable by PCR \n→con7nue treatment with monitoring of ALT every 3 months and HBV \nDNA every 6 months. \n•Patients on combined Lamivudine & Adefovir → continue treatment or \nShift to Tenofovir 300 mg once daily. \n• Lamivudine resistance → Shift: to Tenofovir 300 mg once daily.", "93\nPegylated Interferon\n• Poor response in Egyptian patients who are usually HBeAg negative and \nGenotype D. \n• HBeAg positive patients with high ALT level could be offered a chance of \ntreatment with pegylated interferon alpha for 48 weeks. \n• Assessment is done at week 24 of therapy \n-In case of seroconversion (patient becomes HBeAg –ve and HBeAb +ve \n→continue treatment for 48 wks \n-If no seroconversion →stop treatment and shift to oral antiviral therapy \naccording to previous guidelines\n Special Groups\nLiver Cirrhosis\nAll cirrhotic patients should receive oral antiviral therapy if HBV DNA is \ndetectable by PCR irrespective of the viral load\nCompensated Cirrhosis:\n• Entecavir 0.5 mg or Tenofovir 300mg once daily.\nDecompensated Cirrhosis: \n• Entecavir 1 mg once daily. \n• The dose of antiviral needs to be adjusted in patients with low creatinine \nclearance (< 50ml/min). \nRenal Insufficiency\nEntecavir preferred, with dose adjustments according to creatinine clearance. \nPregnancy \nFor mothers: \n• all pregnant females should be screened for HBsAg. \n• Newly diagnosed pregnant women in the last trimester showing an HBV DNA \nlevel ≥ 105 IU/ML candidate for Lamivudine 100 mg or Tenofovir 300 mg once \ndaily starting last trimester and for 3 months after delivery to decrease chance \nof new-born infection. Re-evaluate the condition after delivery and consider \ntreatment according to the previous guidelines Females who become pregnant \nwhile on treatment: \n•On Lamivudine monotherapy: Continue on treatment \n• On Other lines of treatment: shift to class B drug (Tenofovir 300 mg once\ndaily)", "94\nNewborns \n• Newborns for chronic HBV mothers should receive HBIG and the first \ndose of HBV vaccine at birth (612- hours after delivery). \nHBV/HCV Co infection \n• Patients fulfilling the inclusion criteria for HBV treatment and have co infection with active HCV (HCV RNA +ve by quantitative PCR), \n treat with:\n Peg IFN + Ribavirin\nThere is a potential risk of HBV reactivation during treatment or after \nclearance of HCV so measuring HBV DNA by PCR is recommended every \n3 - 6 months while on therapy and after discontinuation of therapy and oral \nantiviral therapy for HBV may be started if needed.\nHBV/HDV Coinfection \n• Active HDV infection is confirmed by HDV RNA assays. \n• Peg –INF is the only effective drug against HDV. \n• Efficacy of Peg –INF is assessed during treatment after 3 - 6 months by \nmeasuring HDV RNA levels.\n• Optimal duration of therapy is not well defined but therapy for at least\n72 wks.\n• Oral antiviral therapy should be used only when there is active HBV \nreplication according to guidelines. \n• Refer the patient to a specialized HBV center.\nDialysis and Renal Transplant patients\n• All patients with renal dysfunction should be screened for HBV. \n• Seronegative patients should be vaccinated.\n• In patients with CHB Entecavir is preferred for treatment.\n• The dose should be adjusted according to creatinine clearance. \nImmunosuppressed Patients \n• All candidates for chemotherapy and immunosuppressive therapy should \nbe screened for HBsAg and anti HBc prior to initiation of treatment.\n• Vaccination is mandatory for seronegative cases. Higher vaccine doses may \nbe needed. \n• HBsAg positive patients (irrespective of the viral load) should receive oral \nantiviral therapy at the onset of chemotherapy and for 12 months after \ncessation of treatment.", "95\nImmunosuppressed Patients \n• Patients who are: \n• HBsAg –ve, AntiHBc +ve, HBV PCR +ve should be managed in the same \nway as HBsAg +ve cases. \n• HBsAg –ve, AntiHBc +ve, HBV PCR –ve should be followed-up every2 -\n3months. Start oral antiviral if HBV PCR becomes positive. \nWhich oral antiviral? \n • Viral load < 2000 IU/ml and short duration of immunosuppression use \nLamivudine. \n • Viral load ≥2000 IU/ml and long duration or repeated courses of \nimmunosuppression: use Entecavir or Tenofovir. \nWhen to stop antiviral Therapy?\nPatient PegIFN-α therapy NA therapy\nHBeAg(+) 48 weeks Stop treatment 6 -12 months \nafter seroconversion \nHBeAg(-) . IFN not recommended Indefinitely, or until HBsAg \nseroconversion\nOn-treatment monitoring \n• every month: – Visits to receive medication and monitor for compliance \nand side effects. \n• Every 3 months – Check ALT. – For patients on Tenofovir and Adefovir \ncheck serum creatinine. \n• Every 6 months: \n– Check HBV DNA, liver profile, complete blood count, α-fetoprotein, \nabdominal ultrasound. \nMonitoring Patients who are NOT Candidates for Therapy\n• HBeAg Positive: Test ALT, HBeAg, HBV DNA, and HBsAg every 3 - 6 \nmonths. • HBeAg Negative: Test ALT, HBV DNA, HBsAg every 3 - 6 \nmonths.", "96\nAcute HBV \n• Spontaneous recovery in more than 95% of cases and seroconversion to \nanti HBs without antiviral therapy. Supportive management and close \nmonitoring for early identification of fulminant hepatitis. \n• Fulminant hepatitis : \nEntecavir 0.5 mg and to be continued for at least 6 months after \nseroconversion to anti HBs or for at least 12 months after seroconversion to \nanti HBe without HBs Ag loss.\nVaccination \n-Vaccination is highly recommended for:\n• Health care workers \n• Close contacts of viremic patients \n• Chronic renal failure patients before they start renal dialysis. \n• Chronic hepatitis C patients. \n• Immunosuppressed patients. \n• Multi transfused individuals", "97\nHCV Protocol\nInclusion Criteria:-\n1-HCV RNA positivty.\n2-Age: ≥ 18 years\n -Patients ≥ 65 years old should undergo cardiological assessment prior to \ntherapy by ECG, echocardiography and cardiological consultation. \nExclusion criteria: any of the following, \n1- Child's C cirrhotic patients.\n2 - Platelet count < 50000/ mm3\n3- HCC, except 6 months after intervention aiming at cure with no evidence of \nactivity by dynamic imaging (CT or MRI).\n4- Extra –hepatic malignancy except after two years of disease – free \ninterval.\n- In cases of lymphomas and chronic lymph y shown \nthat a proper primary health care and secondary prevention program are \nboth cost effective and inexpensive and hence reduce the burden of disease. \nDespite the documented decrease in the incidence of acute rheumatic fever \nand prevalence of rheumatic heart disease (RHD), it still is an important \ncause of cardiovascular disease worldwide. Heart valve surgery adds to the \nlifelong burden of disease.\nARF/RHD prevention: \nPrimordial level \n-improve environment of the population at risk; housing, reduce overcrowding \n-active case detection and treatment of streptococcal sore throat \n-Primary prevention: treatment of acute streptococcal pharyngitis with \nantibiotics to reduce the incidence of RF. \n- Secondary prevention – is the key focus of most control strategies, due to its \nproven efficacy, cost – effectiveness, and the challenges of primordial and \nprimary prevention. \nBenzathine penicillin G (BPG) is indicated for people with a history of acute\nrheumatic fever (ARF) and rheumatic heart disease (RHD) as secondary \nprophylaxis against GAS infections that can precipitate a recurrence of RF. It \nsignificantly reduces ARF recurrence rates and the severity of rheumatic \nvalvular lesions. The WHO considers BPG an essential medicine.", "117\nDosage:\nAdults and children > 30 kg; 1,200,000 international units (900mg),\nBy intramuscular injection every 4 weeks\nThe recommended dose of BPG for children up to 27-30 kgis 450 mg \n(600,000 IU) IM every 4 weeks. \nOptimum frequency of administration:\n4- weekly injections are effective if good adherence can be assured. The drug \ncan be given more frequently – every 5 weeks – if there is a desire to further \nincrease the efficacy in preventing recurrent ARF.\nStandard care\nDuration of secondary prophylaxis depends on history of carditis and if \nvalvular involvement persists\nMinimum duration is 10 years since last ARF episode or until age 21 years,\nwhichever is longer, with prolongation till age function hl(t, q) {

return t.replace(new RegExp(`(?![^<]*>)(${pat})`,'gi'), '<mark>$1</mark>');
}
function formatText(txt, q='') {

lines.forEach(l => {
let t = l.trim();

if(isLi) {
if(!inList) { out+='<ul class="fmt-ul">'; inList=true; }
let c = esc(t.replace(/^[\-\*•]\s|^\d+\.\s/, '')).replace(/([a-zA-Z0-9\-\.\+\_\/]{2,})/g, '<span class="en-text">$1</span>');
out += `<li>${hl(c, q)}</li>`;
} else {
if(inList) { out+='</ul>'; inList=false; }
let isH = t.length < 80 && !/[.،,]$/.test(t);
let c = esc(t).replace(/([a-zA-Z0-9\-\.\+\_\/]{2,})/g, '<span class="en-text">$1</span>');
out += `<div class="${isH?'fmt-h':'fmt-p'}">${hl(c, q)}</div>`;
}
});
if(inList) out+='</ul>';
